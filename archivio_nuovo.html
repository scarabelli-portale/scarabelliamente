<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVIO SCARABELLIANAMENTE</title>
    <style>
        /* STILE GENERALE */
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; color: #1a1a1a; line-height: 1.4; }
        .copertina-container { position: relative; width: 100%; max-width: 1300px; margin: 0 auto; height: 280px; overflow: hidden; border-bottom: 5px solid #0056b3; }
        .foto-scuola { width: 100%; height: 100%; object-fit: cover; }
        .main-container { max-width: 1300px; margin: 15px auto; padding: 0 10px; }
        .box-articolo { background: white; border: 3px solid #0056b3; padding: 25px; border-radius: 8px; box-shadow: 0 3px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #0056b3; font-size: 1.8rem; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        /* MINIATURE NELL'ARTICOLO */
        .galleria-foto { display: flex; flex-wrap: wrap; gap: 15px; margin: 20px 0; }
        .foto-item { width: 200px; height: 150px; object-fit: cover; border: 2px solid #ddd; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .foto-item:hover { border-color: #0056b3; transform: scale(1.05); }

        /* LO ZOOM "MINISTERIALE" (UGUALE PER TUTTI) */
        #overlay-foto { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); 
            z-index: 99999; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer;
        }
        #foto-ingrandita { 
            max-width: 95vw !important; 
            max-height: 95vh !important; 
            width: auto !important;
            height: auto !important;
            object-fit: contain !important; 
            border: 5px solid white;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: block;
        }

        /* GRIGLIA ARCHIVIO IN BASSO */
        .griglia-archivio { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .card-archivio { background: white; border: 1px solid #ddd; padding: 10px; cursor: pointer; text-align: center; border-radius: 5px; transition: 0.2s; }
        .card-archivio:hover { background: #eef4ff; border-color: #0056b3; }
        .img-miniatura { width: 100%; height: 180px; object-fit: contain; background-color: #eee; }
        .btn-ritorno { display: inline-block; background: #2c3e50; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="overlay-foto" onclick="this.style.display='none'">
        <img id="foto-ingrandita" src="">
    </div>

    <div class="copertina-container">
        <img src="_scuola.JPG" class="foto-scuola">
    </div>

    <div class="main-container">
        <div id="articolo-protagonista"></div>

        <h2 style="color:#0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 5px;">📜 ARCHIVIO DOCUMENTI</h2>
        <div id="lista-archivio" class="griglia-archivio"></div>
        
        <a href="index.html" class="btn-ritorno">← TORNA ALLA HOME</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAZIONE FIREBASE DI SERGIO
        const firebaseConfig = {
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9enZdjEVxZLic",
            authDomain: "sito-sergio-b19ce.firebaseapp.com",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sito-sergio-b19ce",
            appId: "1:194311505630:web:ceb9aead0f020c3697a44f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // FUNZIONE PER LO ZOOM (DEMOCRATICA: VALE PER TUTTI)
        window.apriZoom = function(src) {
            const imgGrande = document.getElementById('foto-ingrandita');
            imgGrande.src = src;
            document.getElementById('overlay-foto').style.display = 'flex';
        };

        let articoliGlobali = [];
        onValue(ref(db, 'archivioSergio'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                articoliGlobali = Object.values(data).reverse();
                leggiArticolo(0); // Carica il primo articolo in alto
                
                const lista = document.getElementById("lista-archivio");
                lista.innerHTML = "";
                articoliGlobali.forEach((art, index) => {
                    const img = art.foto ? art.foto.split(",")[0].trim() : "";
                    lista.innerHTML += `
                        <div class="card-archivio" onclick="leggiArticolo(${index})">
                            ${img ? `<img src="${img}" class="img-miniatura">` : ''}
                            <h3 style="font-size:0.9rem; color:#0056b3;">${art.titolo}</h3>
                        </div>`;
                });
            }
        });

        window.leggiArticolo = function(index) {
            const art = articoliGlobali[index];
            let galleriaHtml = '<div class="galleria-foto">';
            if (art.foto) {
                art.foto.split(",").forEach(f => {
                    // OGNI FOTO CHIAMA LA FUNZIONE APRIZOOM
                    galleriaHtml += `<img src="${f.trim()}" class="foto-item" onclick="apriZoom('${f.trim()}')">`;
                });
            }
            galleriaHtml += '</div>';
            
            document.getElementById("articolo-protagonista").innerHTML = `
                <div class="box-articolo">
                    <h1>${art.titolo}</h1>
                    <p>Autore: <strong>${art.autore}</strong></p>
                    ${galleriaHtml}
                    <div style="white-space:pre-wrap; font-size:1.1rem; border-top:1px dotted #ccc; padding-top:15px;">${art.testo}</div>
                </div>`;
            window.scrollTo({ top: 150, behavior: 'smooth' });
        };
    </script>
</body>
</html>
