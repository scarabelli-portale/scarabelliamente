        </a>
    </div>

    <div class="main-container">
        <div class="box-profilo">
            <img src="immagini/carlo.jpg" class="foto-profilo" onerror="this.src='immagini/_scuola.jpg'">
            <h3 style="color: #0056b3; margin: 5px 0 0 0; font-size: 1rem; text-transform: uppercase;">CARLO</h3>
            <p style="font-style: italic; color: #666; font-size: 0.8rem; margin: 0;">Esperto Economista</p>

                Mercati Finanziari & Commodities
            </div>
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>

        <div id="lista-articoli"></div>
    </div>v>
        <div id="lista-articoli"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9enZdjEVxZLic",
            authDomain: "sito-sergio-b19ce.firebaseapp.com",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sito-sergio-b19ce",
            storageBucket: "sito-sergio-b19ce.firebasestorage.app",
            messagingSenderId: "194311505630",
            appId: "1:194311505630:web:ceb9aead0f020c3697a44f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const articoliRef = ref(db, 'archivioCarlo'); 

        onValue(articoliRef, (snapshot) => {
            const container = document.getElementById("lista-articoli");
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().forEach(art => {
                    container.innerHTML += `
                        <div class="box-articolo">
                            <span style="font-size:0.75rem; color:#666;">Data: ${art.data || ''}</span>
                            <h1>${art.titolo}</h1>
                            <div style="font-size:1.1rem; text-align:justify; white-space:pre-wrap;">${art.testo}</div>
                        </div>`;
                });
            } else {
                container.innerHTML = "<p style='text-align:center;'>L'archivio di Carlo è in fase di aggiornamento.</p>";
            }
        });

        const testoScritta = "ARCHIVIO CARLO";
        let j = 0;
        function animaTitolo() {
            if (j < testoScritta.length) {
                document.getElementById("scritta-animata").innerHTML += testoScritta.charAt(j);
                j++;
                setTimeout(animaTitolo, 130);
            }
        }
        window.onload = animaTitolo;
    </script>
</body>
</html>
