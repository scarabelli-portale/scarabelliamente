<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVIO SCARABELLI - Carlo</title>
    <style>
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; color: #1a1a1a; }
        .copertina-container { position: relative; width: 100%; max-width: 1300px; margin: 0 auto; height: 280px; overflow: hidden; border-bottom: 5px solid #0056b3; }
        .foto-scuola { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; }
        #scritta-animata { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 10px rgba(0,0,0,1); text-transform: uppercase; letter-spacing: 4px; white-space: nowrap; z-index: 10; }
        
        .nav-bar { max-width: 900px; margin: 15px auto; display: flex; align-items: center; background: white; padding: 0 20px; border-radius: 50px; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; height: 50px; justify-content: space-between; }
        .identita-redattore { display: flex; align-items: center; gap: 10px; }
        .foto-redattore-mini { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #0056b3; object-fit: cover; }
        .nome-redattore { font-size: 0.8rem; font-weight: bold; color: #0056b3; text-transform: uppercase; }
        
        .btn-home { background: #0056b3; color: white; padding: 4px 12px; text-decoration: none; border-radius: 20px; font-weight: bold; font-size: 0.6rem; text-transform: uppercase; }
        .btn-gest { background: none; border: none; cursor: pointer; font-size: 1.2rem; filter: grayscale(1); }

        .main-container { max-width: 900px; margin: 0 auto; padding: 10px 20px; }
        
        .area-trading { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
        .box-widget { background: white; border: 1px solid #ddd; border-top: 4px solid #0056b3; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .box-articolo { background: white; border: 1px solid #ddd; border-left: 6px solid #0056b3; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h1 { color: #0056b3; font-size: 1.7rem; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .img-articolo { max-width: 100%; border-radius: 8px; margin-bottom: 15px; display: block; }

        @media (max-width: 850px) { .copertina-container { height: 160px; } #scritta-animata { font-size: 1.2rem; } .area-trading { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="copertina-container"><img src="immagini/scuola.jpg" class="foto-scuola"><div id="scritta-animata"></div></div>
    
    <div class="nav-bar">
        <div class="identita-redattore">
            <img src="immagini/carlo.jpg" class="foto-redattore-mini" onerror="this.src='immagini/scuola.jpg'">
            <span class="nome-redattore">Carlo</span>
        </div>
        <a href="index.html" class="btn-home">Home Page</a>
        <button class="btn-gest" onclick="location.href='gestione_carlo.html'">⚙️</button>
    </div>

    <div class="main-container">
        
        <div style="margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; background: white;">
            <iframe src="https://s.tradingview.com/embed-widget/ticker-tape/?locale=it#%7B%22symbols%22%3A%5B%7B%22proName%22%3A%22FOREXCOM%3ASPX500%22%2C%22title%22%3A%22S%26P%20500%22%7D%2C%7B%22proName%22%3A%22FX_IDC%3AEURUSD%22%2C%22title%22%3A%22EUR%2FUSD%22%7D%2C%7B%22proName%22%3A%22BITSTAMP%3ABTCUSD%22%2C%22title%22%3A%22Bitcoin%22%7D%2C%7B%22proName%22%3A%22INDEX%3AFTSEMIB%22%2C%22title%22%3A%22Borsa%20Milano%22%7D%5D%2C%22showSymbolLogo%22%3Atrue%2C%22colorTheme%22%3A%22light%22%2C%22isTransparent%22%3Afalse%2C%22displayMode%22%3A%22adaptive%22%7D" width="100%" height="46" frameborder="0" scrolling="no"></iframe>
        </div>

        <div class="area-trading" id="sezione-trading">
            <div class="box-widget" style="flex: 1; min-width: 300px; height: 400px;">
                <iframe src="https://s.tradingview.com/embed-widget/technical-analysis/?locale=it#%7B%22interval%22%3A%221D%22%2C%22width%22%3A%22100%25%22%2C%22isTransparent%22%3Afalse%2C%22height%22%3A%22400%22%2C%22symbol%22%3A%22BINANCE%3ABTCUSDT%22%2C%22showIntervalTabs%22%3Atrue%2C%22displayMode%22%3A%22single%22%2C%22colorTheme%22%3A%22light%22%7D" width="100%" height="400" frameborder="0" scrolling="no"></iframe>
            </div>

            <div class="box-widget" style="flex: 1; min-width: 300px; height: 400px; padding: 10px; background: white;">
                <h4 style="text-align:center; margin: 0 0 10px 0; color:#0056b3; font-size:0.8rem; text-transform:uppercase;">Trend di Mercato</h4>
                <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?locale=it#%7B%22symbol%22%3A%22NYMEX%3ACL1!%22%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22110%22%2C%22dateRange%22%3A%221D%22%2C%22colorTheme%22%3A%22light%22%2C%22trendLineColor%22%3A%22rgba(41%2C%2098%2C%20255%2C%201)%22%2C%22underLineColor%22%3A%22rgba(41%2C%2098%2C%20255%2C%200.3)%22%2C%22isTransparent%22%3Afalse%2C%22autosize%22%3Afalse%7D" width="100%" height="110" frameborder="0" scrolling="no"></iframe>
                <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?locale=it#%7B%22symbol%22%3A%22TVC%3AGOLD%22%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22110%22%2C%22dateRange%22%3A%221D%22%2C%22colorTheme%22%3A%22light%22%2C%22trendLineColor%22%3A%22rgba(255%2C%20152%2C%200%2C%201)%22%2C%22underLineColor%22%3A%22rgba(255%2C%20152%2C%200%2C%200.3)%22%2C%22isTransparent%22%3Afalse%2C%22autosize%22%3Afalse%7D" width="100%" height="110" frameborder="0" scrolling="no"></iframe>
                <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?locale=it#%7B%22symbol%22%3A%22FX%3AEURUSD%22%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22110%22%2C%22dateRange%22%3A%221D%22%2C%22colorTheme%22%3A%22light%22%2C%22trendLineColor%22%3A%22rgba(76%2C%20175%2C%2080%2C%201)%22%2C%22underLineColor%22%3A%22rgba(76%2C%20175%2C%2080%2C%200.3)%22%2C%22isTransparent%22%3Afalse%2C%22autosize%22%3Afalse%7D" width="100%" height="110" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>

        <div id="lista-articoli"></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig); 
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const idDaAprire = urlParams.get('id');

        onValue(ref(db, 'archivioCarlo'), (snapshot) => {
            const container = document.getElementById("lista-articoli"); 
            container.innerHTML = "";
            const data = snapshot.val();
            
            if (data) { 
                Object.keys(data).reverse().forEach(id => { 
                    const art = data[id];
                    const displayStyle = idDaAprire ? (id === idDaAprire ? 'block' : 'none') : 'block';
                    
                    if(idDaAprire) {
                        const sez = document.getElementById('sezione-trading');
                        if(sez) sez.style.display = 'none';
                    }

                    let htmlArt = '<div class="box-articolo" style="display: ' + displayStyle + '">';
                    htmlArt += '<span style="font-size:0.75rem; color:#888;">Data: ' + (art.data || '') + '</span>';
                    htmlArt += '<h1>' + art.titolo + '</h1>';
                    
                    if (art.urlImmagine) {
                        htmlArt += '<img src="' + art.urlImmagine + '" class="img-articolo">';
                    }
                    
                    htmlArt += '<div style="font-size:1.1rem; text-align:justify; white-space:pre-wrap;">' + art.testo + '</div>';
                    if (idDaAprire) {
                        htmlArt += '<br><a href="carlo.html" style="color:#0056b3; font-weight:bold; text-decoration:none;">← Torna all\'archivio</a>';
                    }
                    htmlArt += '</div>';
                    container.innerHTML += htmlArt;
                }); 
            }
        });

        const testoScritta = "ECONOMIA E MERCATI"; 
        let j = 0;
        function animaTitolo() { 
            const el = document.getElementById("scritta-animata"); 
            if (el && j < testoScritta.length) { el.innerHTML += testoScritta.charAt(j); j++; setTimeout(animaTitolo, 130); } 
        }
        animaTitolo();
    </script>
</body>
</html>
