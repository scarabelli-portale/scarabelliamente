<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="🚀 ARCHIVIO STORICO - CINZIA">
    <meta property="og:description" content="Vieni a vedere il post ampliato, duraturo e stabile. Molto meglio di WhatsApp!">
    <meta property="og:image" content="https://scarabelli-portale.github.io/immagini/scuola.jpg">
    <meta property="og:type" content="website">
    <title>Archivio - Cinzia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; color: #1a1a1a; line-height: 1.5; }
        .header-fissa { position: fixed; top: 0; width: 100%; height: 250px; z-index: 1000; background: #000; border-bottom: 5px solid #27ae60; overflow: hidden; }
        .foto-header { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; opacity: 0.7; }
        #contenitore-titolo { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; width: 100%; }
        .titolo-stampato { font-size: 0.9rem; letter-spacing: 6px; text-transform: uppercase; color: white; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .firma-persona { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #27ae60; text-shadow: 3px 3px 8px rgba(0,0,0,1); margin-top: -10px; }
        .btn-nav { position: absolute; top: 15px; padding: 10px 18px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 0.7rem; z-index: 1001; display: flex; align-items: center; gap: 5px; }
        .btn-home { left: 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; }
        .content-wrapper { margin-top: 270px; padding: 20px; text-align: center; }
        .griglia-articoli { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .card-didattica { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); cursor: pointer; border: 1px solid #eee; transition: 0.3s; display: flex; flex-direction: column; text-align: left; }
        .card-didattica img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 12px; }
        .card-titolo { font-weight: bold; color: #1e8449; font-size: 1rem; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 2000; overflow-y: auto; padding-top: 50px; }
        .content-view { max-width: 800px; margin: 20px auto; background: #f4f4f2; padding: 30px; border-radius: 15px; position: relative; text-align: center; }
        .chiudi-btn { position: absolute; top: -15px; right: -15px; background: #ff4444; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        .img-view { width: 100%; height: auto; max-height: 500px; object-fit: contain; border-radius: 10px; margin-bottom: 20px; }
        /* Stile pulsanti WhatsApp coordinati alla pagina */
        .btn-condividi-wz { display: inline-flex; align-items: center; justify-content: center; padding: 12px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s; min-width: 200px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="header-fissa">
        <a href="index.html" class="btn-nav btn-home">⬅ HOME</a>
        <img src="immagini/scuola.jpg" class="foto-header">
        <div id="contenitore-titolo">
            <div class="titolo-stampato">Scuola & Lavoro</div>
            <div class="firma-persona">Cinzia</div>
        </div>
    </div>
    <div class="content-wrapper">
        <div class="griglia-articoli" id="container-articoli-cinzia"></div>
    </div>
    <div id="overlay">
        <div class="content-view">
            <button class="chiudi-btn" onclick="chiudiOverlay()">&times;</button>
            <img id="img-view" src="" style="display:none;" class="img-view">
            <div id="container-wz-cinzia"></div>
            <h2 id="titolo-view" style="color: #27ae60; font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin-top: 15px;"></h2>
            <div id="testo-view" style="text-align:justify; white-space:pre-wrap; font-size: 1.1rem; background: rgba(0,0,0,0.03); padding: 25px; border-radius: 10px; border-left: 6px solid #27ae60;"></div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        function pulisciLink(url) { if (!url) return ""; let trovato = url.match(/https?:\/\/[^"'>\s]+\.(?:jpg|jpeg|gif|png|webp)/i); return trovato ? trovato[0] : url.trim(); }
        
        // Gestione apertura automatica da link esterno (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        if (postId) { setTimeout(() => { apri(postId); }, 1000); }

        window.apri = function(id) {
            db.ref('archivioCinzia/' + id).once('value').then((snap) => {
                const art = snap.val(); if(!art) return;
                const imgV = document.getElementById('img-view');
                if(art.immagine) { imgV.src = pulisciLink(art.immagine); imgV.style.display = 'block'; } else { imgV.style.display = 'none'; }
                document.getElementById('titolo-view').innerText = art.titolo;
                document.getElementById('testo-view').innerText = art.testo;
                
                // INTERVENTO CHIRURGICO: Generazione del link e della struttura dei messaggi
                const urlSito = "https://scarabelli-portale.github.io/cinzia.html?id=" + id;
                const msgTutti = encodeURIComponent(
                    "🚀 *VIENI A VEDERE SUL SITO IL POST AMPLIATO, DURATURO E STABILE.*\n\n" +
                    "📢 *Cosa che purtroppo non succede su WhatsApp dove tutto scorre via.*\n\n" +
                    "📖 Titolo: *" + art.titolo + "*\n" +
                    "🔗 Apri l'archivio qui: " + urlSito
                );
                const msgMe = encodeURIComponent(
                    "📌 ARCHIVIO PERSONALE:\n" +
                    "Post: " + art.titolo + "\n" +
                    "Link: " + urlSito
                );

                // Inserimento dei tre pulsanti grafici nell'overlay
                document.getElementById('container-wz-cinzia').innerHTML = `
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0;">
                        <a href="https://api.whatsapp.com/send?text=${msgTutti}" target="_blank" class="btn-condividi-wz" style="background: white; color: #1b5e20 !important; border: 3px solid #1b5e20;">
                            <b style="margin-right:10px;">WZ</b> Consiglio Scarabelli
                        </a>
                        <a href="https://api.whatsapp.com/send?text=${msgTutti}" target="_blank" class="btn-condividi-wz" style="background: white; color: #1b5e20 !important; border: 3px solid #1b5e20;">
                            <b style="margin-right:10px;">WZ</b> Tutti gli ex allievi
                        </a>
                        <a href="https://wa.me/393398329580?text=${msgMe}" target="_blank" class="btn-condividi-wz" style="background: #128C7E; color: white !important; border: none;">
                            <b style="margin-right:10px;">WZ</b> Archivio Personale
                        </a>
                    </div>`;

                document.getElementById('overlay').style.display = 'block'; document.body.style.overflow = 'hidden';
            });
        }
        
        // INTERVENTO CHIRURGICO: Pulizia del link all'uscita per togliere l'id dalla barra indirizzi
        window.chiudiOverlay = function() { 
            document.getElementById('overlay').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        db.ref('archivioCinzia').on('value', (snapshot) => {
            const container = document.getElementById('container-articoli-cinzia'); container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const art = data[id]; const imgPulita = art.immagine ? pulisciLink(art.immagine) : 'https://via.placeholder.com/400x250?text=Didattica';
                    container.innerHTML += `<div class="card-didattica" onclick="apri('${id}')"><img src="${imgPulita}"><div class="card-info"><div class="card-titolo">${art.titolo}</div></div></div>`;
                });
            }
        });
    </script>
</body>
</html>
