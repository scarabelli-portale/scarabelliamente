<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Didattica - Cinzia</title>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #f4f4f2; color: #1a1a1a; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid #27ae60; }
        h1 { color: #27ae60; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .btn-torna { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #27ae60; font-weight: bold; border: 1px solid #27ae60; padding: 8px 15px; border-radius: 6px; transition: 0.3s; }
        .btn-torna:hover { background: #27ae60; color: white; }
        
        /* CRUCIALE: Nasconde gli articoli di base per permettere il filtro */
        .articolo-scheda { display: none; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .articolo-scheda img { max-width: 100%; border-radius: 8px; margin: 15px 0; border: 1px solid #ddd; }
        .articolo-scheda h2 { color: #2c3e50; margin-top: 0; }
        .testo-articolo { line-height: 1.6; font-size: 1.1rem; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-torna">← Torna alla Home</a>
        <h1>Area Didattica & Lavoro</h1>
        <div id="container-articoli-cinzia">
            <p style="text-align:center; color:#999;">Caricamento lezioni in corso...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // FUNZIONE PER PULIRE IL TESTO
        function cleanText(text) {
            return text ? text.replace(/[^a-zA-Z0-9\sàèìòùÁÉÍÓÚáéíóú,.!?;:()\-]/g, '').trim() : "";
        }

        // LOGICA DI CARICAMENTO E FILTRO
        db.ref('archivioCinzia').on('value', (snapshot) => {
            const container = document.getElementById('container-articoli-cinzia');
            container.innerHTML = "";
            
            // 1. Leggiamo l'ID dall'indirizzo (es: cinzia.html?id=-Nxyz...)
            const urlParams = new URLSearchParams(window.location.search);
            const idDaAprire = urlParams.get('id');

            snapshot.forEach((child) => {
                const id = child.key;
                const art = child.val();
                
                const div = document.createElement('div');
                div.className = "articolo-scheda";
                div.id = id;

                // 2. DECIDIAMO SE MOSTRARE L'ARTICOLO
                // Se c'è un ID specifico nell'URL, mostriamo solo quello
                if (idDaAprire && id === idDaAprire) {
                    div.style.display = "block";
                } 
                // Se NON c'è nessun ID nell'URL, mostriamo tutto l'archivio
                else if (!idDaAprire) {
                    div.style.display = "block";
                }

                div.innerHTML = `
                    <h2>${cleanText(art.titolo)}</h2>
                    ${(art.immagine || art.urlImmagine) ? `<img src="${art.immagine || art.urlImmagine}">` : ""}
                    <div class="testo-articolo">${cleanText(art.testo)}</div>
                `;
                // Inseriamo in alto l'ultimo post
                container.insertBefore(div, container.firstChild);
            });

            // Se abbiamo filtrato un articolo, facciamo un piccolo scroll per centrarlo
            if (idDaAprire) {
                setTimeout(() => {
                    const el = document.getElementById(idDaAprire);
                    if(el) el.scrollIntoView({ behavior: 'smooth' });
                }, 500);
            }
        });
    </script>
</body>
</html>
