<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANNELLO CONTROLLO SERGIO</title>
    <style>
        body { font-family: Arial, sans-serif; background: #143ca0; color: white; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; color: #333; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        .btn-pubblica { background: #28a745; color: white; }
        .btn-pubblica:hover { background: #218838; }
        .torna-su { display: block; margin-top: 20px; color: white; text-decoration: none; font-size: 0.9rem; }
        h2 { color: #143ca0; margin-top: 0; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <h2>GESTIONE ARCHIVIO SERGIO</h2>
        
        <label>TITOLO</label>
        <input type="text" id="titolo" placeholder="Inserisci il titolo...">
        
        <label>STORIA / TESTO</label>
        <textarea id="testo" rows="5" placeholder="Scrivi la tua storia..."></textarea>
        
        <label>LINK IMMAGINE (COPERTINA)</label>
        <input type="text" id="immagine" placeholder="Incolla link immagine...">
        
        <label>LINK YOUTUBE</label>
        <input type="text" id="video" placeholder="Incolla link video YouTube...">

        <button class="btn-pubblica" onclick="inviaTutto()">🚀 PUBBLICA NELL'ARCHIVIO DI SERGIO</button>
        <div id="messaggio" style="margin-top:10px; font-weight:bold; color: green;"></div>
    </div>

    <a href="../sergio.html" class="torna-su">⬅ Torna a vedere il tuo Archivio</a>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9EnZdjEVxZLIc",
            authDomain: "sito-sergio-b19ce.firebaseapp.com",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "sito-sergio-b19ce"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function inviaTutto() {
            const titolo = document.getElementById('titolo').value;
            const testo = document.getElementById('testo').value;
            const immagine = document.getElementById('immagine').value;
            const video = document.getElementById('video').value;

            if (titolo === "" || immagine === "") {
                alert("Metti almeno un titolo e una immagine!");
                return;
            }

            // QUI È DOVE AVVIENE LA MAGIA: PUNTA A SERGIO
            database.ref('archivioSergio').push({
                titolo: titolo,
                testo: testo,
                immagine: immagine,
                video: video
            }).then(() => {
                document.getElementById('messaggio').innerText = "✅ SALVATO CON SUCCESSO!";
                // Pulisce i campi
                document.getElementById('titolo').value = "";
                document.getElementById('testo').value = "";
                document.getElementById('immagine').value = "";
                document.getElementById('video').value = "";
            }).catch((error) => {
                alert("Errore nel salvataggio: " + error.message);
            });
        }
    </script>
</body>
</html>
