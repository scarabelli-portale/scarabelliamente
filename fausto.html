<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVIO METEO - FAUSTO</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f4f2; padding-bottom: 100px; }

        /* TESTATA STILE SERGIO */
        .copertina-container { position: relative; width: 100%; height: 280px; overflow: hidden; border-bottom: 5px solid #143ca0; background: #000; }
        .foto-scuola { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        #contenitore-titolo { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; width: 100%; }
        .firma-fausto { font-family: 'Dancing Script', cursive; font-size: 2.3rem; color: white; text-shadow: 2px 2px 6px rgba(0,0,0,1); }

        .btn-nav { position: absolute; top: 15px; padding: 8px 18px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.75rem; z-index: 20; border: none; cursor: pointer; }
        .btn-home { left: 15px; background: rgba(0,0,0,0.6); color: white; }

        /* --- IL GRANDE MONITOR RADAR/SATELLITE --- */
        .sezione-radar { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .monitor-cornice { background: #000; border: 5px solid #143ca0; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .monitor-radar { width: 100%; height: 500px; border: none; }
        .titolo-monitor { color: #143ca0; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; text-align: center; }

        /* GALLERIA FOTO (I TUOI POST) */
        .container-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; padding: 15px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .card h3 { font-size: 1rem; color: #143ca0; margin-top: 10px; text-align: center; }

        /* --- FINESTRA MAGICA (MODAL) PER INGRANDIMENTO --- */
        .modal { display: none; position: fixed; z-index: 10001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background-color: #fefefe; margin: 5% auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 800px; position: relative; }
        .close { position: absolute; top: 10px; right: 20px; color: #aaa; font-size: 35px; font-weight: bold; cursor: pointer; }
        .modal-media img { width: 100%; border-radius: 10px; display: block; }
        .modal-text { margin-top: 20px; line-height: 1.6; color: #333; white-space: pre-wrap; font-size: 1.1rem; }

        .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 1000; }
        .btn-footer { text-decoration: none; color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <div class="copertina-container">
        <a href="index.html" class="btn-nav btn-home">⬅ HOME</a>
        <img src="immagini/scuola.jpg" class="foto-scuola">
        <div id="contenitore-titolo">
            <div class="firma-fausto">Archivio Fausto</div>
        </div>
    </div>

  <div class="sezione-radar">
        <span class="titolo-monitor">📡 MONITOR SATELLITE & CENTRALE RADAR LIVE</span>
        <div class="monitor-cornice" style="display: flex; background: #000; gap: 5px; flex-wrap: wrap;">
            
            <div style="flex: 1; min-width: 300px; height: 500px;">
                <iframe src="sat.html" style="width: 100%; height: 100%; border: none;"></iframe>
            </div>

            <div style="flex: 1; min-width: 300px; height: 500px; border-left: 2px solid #143ca0; position: relative; background: #111; display: flex; align-items: center; justify-content: center; flex-direction: column; overflow: hidden; cursor: pointer;" onclick="window.open('https://www.windy.com/it/-Radar-meteo-radar?radar,44.449,11.799,7', '_blank')">
                
                <img src="https://www.windy.com/img/share-v2.jpg" style="position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4;">

                <div style="z-index: 10; text-align: center; padding: 20px; background: rgba(0,0,0,0.6); border-radius: 15px; border: 1px solid #143ca0;">
                    <h3 style="color: #00a8e8; margin: 0 0 10px 0;">RADAR INTERATTIVO</h3>
                    <p style="color: white; font-size: 0.85rem; margin-bottom: 15px;">Clicca per attivare la mappa<br>zoomabile a tutto schermo</p>
                    <div style="background: #27ae60; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; display: inline-block;">
                        🌍 APRI RADAR LIVE
                    </div>
                </div>
            </div>

        </div>
        <p style="text-align:center; font-size:0.8rem; color:#666; margin-top: 10px;">
            A sinistra: Satellite in tempo reale | A destra: Clicca per il Radar Zoomabile
        </p>
    </div>

    <hr style="max-width: 1200px; margin: 40px auto; border: 0; border-top: 1px solid #ccc;">
    <span style="display:block; text-align:center; color:#666; font-weight:bold; text-transform:uppercase;">Le tue foto archiviate</span>

    <div id="gallery" class="container-gallery"></div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="chiudiModal()">&times;</span>
            <div id="modal-media" class="modal-media"></div>
            <h2 id="modal-titolo" style="text-align:left; margin-top:20px; color:#143ca0;"></h2>
            <div id="modal-testo" class="modal-text"></div>
            <button onclick="chiudiModal()" style="margin-top:20px; padding:12px; background:#143ca0; color:white; border:none; border-radius:8px; width:100%; cursor:pointer; font-weight:bold;">TORNA ALL'ARCHIVIO</button>
        </div>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="btn-footer">🏠 Home</a>
        <a href="fausto.html" class="btn-footer">📚 Archivio</a>
        <a href="gestione_fausto.html" class="btn-footer">⚙️ Gestione</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9EnZdjEVxZLIc",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        
        const db = firebase.database().ref('archivioFausto'); 
        db.on('value', snap => {
            const container = document.getElementById('gallery');
            const dati = snap.val();
            if(dati) {
                container.innerHTML = "";
                Object.keys(dati).reverse().forEach(id => {
                    const post = dati[id];
                    
                    // Pulizia link ImgBB se necessario
                    let imgLink = post.immagine || '';
                    if (imgLink.includes('<img')) {
                        const m = imgLink.match(/src="([^"]+)"/);
                        if (m) imgLink = m[1];
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => apriModal(post.titolo, post.testo, imgLink);
                    
                    card.innerHTML = `
                        <img src="${imgLink}" onerror="this.src='immagini/fausto.jpg'">
                        <h3>${post.titolo}</h3>
                        <p style="text-align:center; font-size:0.9rem; color:#555;">${post.testo || ''}</p>
                    `;
                    container.appendChild(card);
                });
            }
        });

        function apriModal(titolo, testo, immagine) {
            const modal = document.getElementById("myModal");
            const mMedia = document.getElementById("modal-media");
            document.getElementById("modal-titolo").innerText = titolo;
            document.getElementById("modal-testo").innerText = testo || "";
            mMedia.innerHTML = `<img src="${immagine}">`;
            modal.style.display = "block";
        }

        function chiudiModal() {
            document.getElementById("myModal").style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById("myModal")) { chiudiModal(); }
        }
    </script>
</body>
</html>
