<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Fausto</title>
    <style>
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; padding: 20px; }
        .header { background: #00a8e8; color: white; text-align: center; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .container-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 10px; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .btn-home { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #00a8e8; font-weight: bold; }
        /* Stili per il login se necessario */
        .login-box { display: none; background: white; padding: 30px; border-radius: 20px; max-width: 400px; margin: 50px auto; text-align: center; border: 1px solid #ddd; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
        .btn-entra { background: #00a8e8; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="area-gallery">
        <a href="index.html" class="btn-home">⬅ TORNA ALLA HOME</a>
        <div class="header">
            <h1>Archivio Meteo & Satellite</h1>
            <p>I post di Fausto</p>
        </div>
        <div id="gallery" class="container-gallery"></div>
    </div>

    <div id="area-login" class="login-box">
        <h2>Accesso Riservato Fausto</h2>
        <input type="password" id="pass" placeholder="Inserisci Password">
        <br>
        <button class="btn-entra" onclick="check()">ENTRA NELLA GESTIONE</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database().ref('archivioFausto');

        // Controllo: se nell'URL c'è scritto ?login allora mostro la password
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('login')) {
            document.getElementById('area-gallery').style.display = 'none';
            document.getElementById('area-login').style.display = 'block';
        }

        function check() {
            if (document.getElementById('pass').value === '123') { // Metti la tua pass
                sessionStorage.setItem('accesso_fausto', 'ok');
                window.location.href = 'gestione_fausto.html';
            } else { alert("Password errata!"); }
        }

        // Caricamento galleria
        db.on('value', snap => {
            const container = document.getElementById('gallery');
            container.innerHTML = "";
            const dati = snap.val();
            if(dati) {
                Object.keys(dati).reverse().forEach(id => {
                    const post = dati[id];
                    container.innerHTML += `<div class="card">${post.immagine ? `<img src="${post.immagine}">` : ''}<h3>${post.titolo}</h3></div>`;
                });
            }
        });
    </script>
</body>
</html>
