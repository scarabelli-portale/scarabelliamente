<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METEO E TERRITORIO - Fausto Ravaldi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; color: #1a1a1a; line-height: 1.5; }

        /* TESTATA FISSA: Non scompare mai */
        .header-fissa {
            position: fixed;
            top: 0;
            width: 100%;
            height: 250px;
            z-index: 1000;
            background: #000;
            border-bottom: 5px solid #00a8e8;
            overflow: hidden;
        }
        
        .foto-header { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; opacity: 0.7; }
        
        #contenitore-titolo { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            text-align: center; 
            width: 100%; 
        }
        
        .titolo-stampato { font-size: 0.9rem; letter-spacing: 6px; text-transform: uppercase; color: white; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .firma-persona { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #00a8e8; text-shadow: 3px 3px 8px rgba(0,0,0,1); margin-top: -10px; }

        .btn-nav { position: absolute; top: 15px; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 0.75rem; z-index: 1001; }
        .btn-home { left: 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; }
        .btn-gest { right: 15px; background: #00a8e8; color: white; border: none; cursor: pointer; }

        /* CORPO PAGINA: Parte sotto la testata */
        .content-wrapper { margin-top: 270px; padding: 20px; }

        /* GRIGLIA E WIDGET */
        .meteo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .box-strumento { background: white; border-radius: 15px; border-bottom: 4px solid #00a8e8; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .griglia-articoli { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: auto; }
        .card-meteo { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); cursor: pointer; border: 1px solid #eee; }

        /* OVERLAY CHIARO: Parte sotto la testata */
        #overlay { 
            display: none; 
            position: fixed; 
            top: 250px; /* Parte esattamente dove finisce la testata */
            left: 0; 
            width: 100%; 
            height: calc(100% - 250px); 
            background: rgba(244, 244, 242, 0.95); /* Colore giallino chiaro come il sito */
            z-index: 2000; 
            overflow-y: auto; 
        }
        
        .content-view { max-width: 800px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        .chiudi-btn { position: sticky; top: 0; float: right; background: #ff4444; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 22px; }
        .img-view { width: 100%; border-radius: 10px; margin-bottom: 20px; max-height: 450px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header-fissa">
        <a href="index.html" class="btn-nav btn-home">⬅ HOME</a>
        <button class="btn-nav btn-gest" onclick="window.location.href='gestione_fausto.html'">⚙ GESTIONE</button>
        <img src="immagini/scuola.jpg" class="foto-header" onerror="this.src='https://via.placeholder.com/1300x250?text=Archivio+Scarabelli'">
        <div id="contenitore-titolo">
            <div class="titolo-stampato">METEO E TERRITORIO</div>
            <div class="firma-persona">Fausto Ravaldi</div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="meteo-grid">
            <div class="box-strumento">
                <iframe width="100%" height="300" src="https://embed.windy.com/embed2.html?lat=44.354&lon=11.714&zoom=8&overlay=rain&product=ecmwf&pressure=true&type=map" frameborder="0"></iframe>
            </div>
            <div class="box-strumento">
                <iframe src="https://www.ilmeteo.it/box/previsioni.php?citta=3425&type=real1&width=300&ico=5&lang=ita&days=3&font=Arial&bg=FFFFFF&bgtitle=00a8e8&fgtitle=FFFFFF" width="100%" height="300" frameborder="0"></iframe>
            </div>
        </div>

        <div style="text-align:center; margin: 30px 0; color: #00a8e8; font-weight: bold;">— ARCHIVIO NOTIZIE —</div>
        <div class="griglia-articoli" id="lista-articoli"></div>
    </div>

    <div id="overlay">
        <div class="content-view">
            <button class="chiudi-btn" onclick="chiudiOverlay()">&times;</button>
            <img id="img-view" src="" style="display:none;" class="img-view">
            <h2 id="titolo-view" style="color: #00a8e8; font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin-top:0;"></h2>
            <div id="data-view" style="color: #888; margin-bottom: 15px;"></div>
            <div id="testo-view" style="text-align:justify; white-space:pre-wrap;"></div>
            <div style="text-align:center; margin-top:30px;">
                <button onclick="chiudiOverlay()" style="padding:10px 25px; background:#00a8e8; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">TORNA ALL'ELENCO</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const idDaAprire = urlParams.get('id');

        onValue(ref(db, 'archivioFausto'), (snapshot) => {
            const container = document.getElementById("lista-articoli");
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const art = data[id];
                    const img = art.immagine || art.urlImmagine || 'https://via.placeholder.com/400x250?text=Meteo';
                    container.innerHTML += `
                        <div class="card-meteo" onclick="apri('${id}')">
                            <img src="${img}" style="width:100%; height:160px; object-fit:cover;">
                            <div style="padding:15px;">
                                <div style="color:#888; font-size:0.7rem;">${art.data || ''}</div>
                                <div style="font-weight:bold;">${art.titolo}</div>
                            </div>
                        </div>`;
                });
                if (idDaAprire) apri(idDaAprire);
            }
        });

        window.apri = function(id) {
            get(ref(db, 'archivioFausto/' + id)).then((snap) => {
                const art = snap.val();
                if(!art) return;
                const imgV = document.getElementById('img-view');
                if(art.immagine || art.urlImmagine) {
                    imgV.src = art.immagine || art.urlImmagine;
                    imgV.style.display = 'block';
                } else { imgV.style.display = 'none'; }
                document.getElementById('titolo-view').innerText = art.titolo;
                document.getElementById('data-view').innerText = "Bollettino del: " + (art.data || 'N.D.');
                document.getElementById('testo-view').innerText = art.testo;
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('overlay').scrollTo(0,0);
            });
        }

        window.chiudiOverlay = function() {
            document.getElementById('overlay').style.display = 'none';
            if (window.location.search.includes('id=')) {
                window.history.replaceState({}, document.title, "fausto.html");
            }
        }
    </script>
</body>
</html>
