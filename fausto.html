<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METEO E TERRITORIO - Fausto Ravaldi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; color: #1a1a1a; line-height: 1.5; }
        
        /* TESTATA UNIFORMATA */
        .copertina-container { position: relative; width: 100%; height: 250px; overflow: hidden; border-bottom: 5px solid #00a8e8; background: #000; }
        .foto-header { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; filter: brightness(0.8); }
        #contenitore-titolo { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; width: 100%; }
        .titolo-stampato { font-size: 0.9rem; letter-spacing: 6px; text-transform: uppercase; color: white; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .firma-persona { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #00a8e8; text-shadow: 3px 3px 8px rgba(0,0,0,1); margin-top: -10px; }

        .btn-nav { position: absolute; top: 15px; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 0.75rem; z-index: 40; border: none; cursor: pointer; transition: 0.3s; }
        .btn-home { left: 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; }
        .btn-home:hover { background: white; color: #00a8e8; }
        .btn-gest { right: 15px; background: #00a8e8; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* STRUMENTI METEO */
        .meteo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .box-strumento { background: white; border-radius: 15px; border-bottom: 4px solid #00a8e8; padding: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .titolo-mini { text-align: center; font-size: 0.85rem; font-weight: bold; color: #00a8e8; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* BARRA CONTATTI */
        .contatti-bar { display: flex; justify-content: center; gap: 30px; margin: 10px 0 30px 0; }
        .btn-link { text-decoration: none; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-wz { color: #25D366; }
        .btn-mail { color: #00a8e8; }
        .btn-link:hover { transform: scale(1.1); }

        /* GRIGLIA ARTICOLI */
        .griglia-articoli { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: auto; }
        .card-meteo { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column; }
        .card-meteo:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,168,232,0.2); border-color: #00a8e8; }
        
        .img-card { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .info-card { padding: 20px; flex-grow: 1; }
        .titolo-card { font-weight: bold; color: #2c3e50; font-size: 1.1rem; margin-bottom: 10px; line-height: 1.3; }
        .data-card { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }

        /* OVERLAY DI LETTURA */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 25, 40, 0.98); z-index: 9999; color: white; overflow-y: auto; padding: 40px 20px; }
        .content-view { max-width: 800px; margin: auto; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .chiudi-btn { position: absolute; top: -20px; right: -10px; background: #ff4444; color: white; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .img-view { width: 100%; max-height: 400px; object-fit: cover; border-radius: 10px; margin-bottom: 25px; border: 3px solid rgba(255,255,255,0.1); }
        
        @media (max-width: 600px) { .firma-persona { font-size: 2.5rem; } .content-view { padding: 20px; } }
    </style>
</head>
<body>

    <div class="copertina-container">
        <a href="index.html" class="btn-nav btn-home">⬅ HOME</a>
        <button class="btn-nav btn-gest" onclick="window.location.href='gestione_fausto.html'">⚙ GESTIONE</button>
        <img src="immagini/scuola.jpg" class="foto-header">
        <div id="contenitore-titolo">
            <div class="titolo-stampato">METEO E TERRITORIO</div>
            <div class="firma-persona">Fausto Ravaldi</div>
        </div>
    </div>

    <div class="meteo-grid">
        <div class="box-strumento">
            <div class="titolo-mini">📡 Radar Precipitazioni Live</div>
            <iframe width="100%" height="300" src="https://embed.windy.com/embed2.html?lat=44.354&lon=11.714&zoom=8&overlay=rain&product=ecmwf&pressure=true&type=map" frameborder="0" style="border-radius: 10px;"></iframe>
        </div>
        <div class="box-strumento">
            <div class="titolo-mini">☀️ Previsioni Prossimi Giorni</div>
            <iframe src="https://www.ilmeteo.it/box/previsioni.php?citta=3425&type=real1&width=300&ico=5&lang=ita&days=3&font=Arial&fontsize=12&bg=FFFFFF&fg=000000&bgtitle=00a8e8&fgtitle=FFFFFF&bgbox=F8F9FA&fgbox=333333" width="100%" height="300" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>

    <div class="contatti-bar">
        <a href="https://wa.me/39NUMERO_FAUSTO" class="btn-link btn-wz"><span>📲</span> WhatsApp Fausto</a>
        <a href="mailto:fausto@esempio.it" class="btn-link btn-mail"><span>✉</span> Email Redazione</a>
    </div>

    <div style="text-align:center; margin-bottom: 10px; color: #00a8e8; font-weight: bold; letter-spacing: 2px;">— ARCHIVIO NOTIZIE —</div>
    <div class="griglia-articoli" id="lista-articoli">
        <p style="text-align:center; grid-column: 1/-1;">Caricamento bollettini in corso...</p>
    </div>

    <div id="overlay">
        <div class="content-view">
            <button class="chiudi-btn" onclick="document.getElementById('overlay').style.display='none'">&times;</button>
            <img id="img-view" src="" style="display:none;">
            <h2 id="titolo-view" style="font-family: 'Dancing Script', cursive; color: #00a8e8; font-size: 2.8rem; margin-top:0;"></h2>
            <div id="data-view" style="color: #888; margin-bottom: 20px; font-size: 0.9rem;"></div>
            <div id="testo-view" style="text-align:justify; white-space:pre-wrap; font-size: 1.1rem; line-height: 1.7;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const articoliRef = ref(db, 'archivioFausto'); 

        onValue(articoliRef, (snapshot) => {
            const container = document.getElementById("lista-articoli");
            container.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const art = data[id];
                    const fotoUrl = art.immagine || art.urlImmagine || 'immagini/meteo-default.jpg';
                    
                    container.innerHTML += `
                        <div class="card-meteo" onclick="apri('${id}')">
                            <img src="${fotoUrl}" class="img-card" onerror="this.src='https://via.placeholder.com/400x250?text=Meteo+Territorio'">
                            <div class="info-card">
                                <div class="data-card">${art.data || 'Oggi'}</div>
                                <div class="titolo-card">${art.titolo}</div>
                                <div style="color:#666; font-size:0.85rem;">Clicca per leggere il bollettino...</div>
                            </div>
                        </div>`;
                });
            } else {
                container.innerHTML = "<p style='text-align:center; color:#888; grid-column: 1/-1;'>Nessun articolo trovato nell'archivio di Fausto.</p>";
            }
        });

        window.apri = function(id) {
            onValue(ref(db, 'archivioFausto/' + id), (snap) => {
                const art = snap.val();
                const imgView = document.getElementById('img-view');
                const fotoUrl = art.immagine || art.urlImmagine;

                if(fotoUrl) {
                    imgView.src = fotoUrl;
                    imgView.style.display = 'block';
                } else {
                    imgView.style.display = 'none';
                }

                document.getElementById('titolo-view').innerText = art.titolo;
                document.getElementById('data-view').innerText = "Bollettino del: " + (art.data || 'Data non disponibile');
                document.getElementById('testo-view').innerText = art.testo;
                document.getElementById('overlay').style.display = 'block';
            }, {onlyOnce: true});
        }
    </script>
</body>
</html>
