<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestione Francesco</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 90%; max-width: 400px; text-align: center; border: 1px solid #eee; }
        h2 { color: #1a73e8; margin-bottom: 25px; font-size: 26px; }
        .input-group { position: relative; margin-bottom: 25px; }
        input { width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; box-sizing: border-box; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; font-size: 22px; padding: 10px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-entra { background-color: #1a73e8; color: white; margin-bottom: 15px; }
        .btn-home { background-color: #ffffff; color: #5f6368; border: 1px solid #dadce0; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Gestione Francesco</h2>
    <div class="input-group">
        <input type="password" id="password" placeholder="Password di accesso">
        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
    </div>
    <button class="btn-entra" onclick="checkPassword()">ENTRA</button>
    <button class="btn-home" onclick="window.location.href='index.html'">🏠 HOME</button>
</div>
<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const icon = document.querySelector('.toggle-password');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye');
        }
    }
    function checkPassword() {
        const pass = document.getElementById('password').value;
        if (pass === '123') { 
            // Questa riga manda alla pagina interna
            window.location.href = 'gestione_francesco.html';
        } else { alert('Password errata!'); }
    }
</script>
</body>
</html>
