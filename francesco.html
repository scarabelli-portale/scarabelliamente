<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVIO - Francesco</title>
    <style>
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; color: #1a1a1a; line-height: 1.4; }
        .copertina-container { position: relative; width: 100%; max-width: 1300px; margin: 0 auto; height: 280px; overflow: hidden; border-bottom: 5px solid #0056b3; }
        .foto-scuola { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }
        #scritta-animata { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 10px rgba(0,0,0,1); text-transform: uppercase; letter-spacing: 4px; white-space: nowrap; z-index: 10; }
        .main-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .box-profilo { text-align: center; background: white; padding: 15px; border-radius: 12px; border: 3px solid #0056b3; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 250px; margin-left: auto; margin-right: auto; }
        .foto-profilo { width: 75px; height: 100px; object-fit: cover; border: 2px solid #0056b3; border-radius: 8px; }
        .box-articolo { background: white; border: 3px solid #0056b3; padding: 25px; border-radius: 8px; box-shadow: 0 3px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #0056b3; font-size: 1.8rem; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="copertina-container">
        <img src="immagini/_scuola.jpg" class="foto-scuola">
        <div id="scritta-animata"></div> 
    </div>

    <div style="text-align: center; margin: 20px;">
        <a href="index.html" style="background: #0056b3; color: white; padding: 10px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">
            ← TORNA ALLA HOME
        </a>
    </div>

    <div class="main-container">
        <div class="box-profilo">
            <img src="immagini/francesco.jpg" class="foto-profilo" onerror="this.src='immagini/_scuola.jpg'">
            <h3 style="color: #0056b3; margin: 5px 0 0 0; font-size: 1rem;">FRANCESCO</h3>
            <p style="font-style: italic; color: #666; font-size: 0.8rem; margin: 0;">Collaboratore Archivio</p>
        </div>
        <div id="lista-articoli"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9enZdjEVxZLic",
            authDomain: "sito-sergio-b19ce.firebaseapp.com",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sito-sergio-b19ce",
            storageBucket: "sito-sergio-b19ce.firebasestorage.app",
            messagingSenderId: "194311505630",
            appId: "1:194311505630:web:ceb9aead0f020c3697a44f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const articoliRef = ref(db, 'archivioFrancesco'); 

        onValue(articoliRef, (snapshot) => {
            const container = document.getElementById("lista-articoli");
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().forEach(art => {
                    container.innerHTML += `
                        <div class="box-articolo">
                            <span style="font-size:0.75rem; color:#666;">Data: ${art.data || ''}</span>
                            <h1>${art.titolo}</h1>
                            <div style="font-size:1.1rem; text-align:justify; white-space:pre-wrap;">${art.testo}</div>
                        </div>`;
                });
            } else {
                container.innerHTML = "<p style='text-align:center;'>L'archivio di Francesco è in fase di aggiornamento.</p>";
            }
        });

        const testoScritta = "ARCHIVIO FRANCESCO";
        let j = 0;
        function animaTitolo() {
            if (j < testoScritta.length) {
                document.getElementById("scritta-animata").innerHTML += testoScritta.charAt(j);
                j++;
                setTimeout(animaTitolo, 130);
            }
        }
        window.onload = animaTitolo;
    </script>
</body>
</html>
