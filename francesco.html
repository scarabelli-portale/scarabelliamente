<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVIO FRANCESCO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f4f2; padding-bottom: 100px; }
        .copertina-container { position: relative; width: 100%; height: 280px; overflow: hidden; border-bottom: 5px solid #143ca0; background: #000; }
        .foto-scuola { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .firma-francesco { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); font-family: 'Dancing Script', cursive; font-size: 2.3rem; color: white; text-shadow: 2px 2px 6px rgba(0,0,0,1); width: 100%; text-align: center; }
        .btn-nav { position: absolute; top: 15px; left: 15px; padding: 8px 18px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.75rem; background: rgba(0,0,0,0.6); color: white; z-index: 20; }
        .container-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 30px; max-width: 1300px; margin: auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        .card img, .card iframe { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; border: none; background: #eee; }
        .card h3 { font-size: 0.9rem; font-weight: bold; color: #143ca0; text-transform: uppercase; margin: 15px 0 5px 0; text-align: center; }
        .card p { font-size: 0.9rem; color: #555; text-align: center; margin: 0; }
        .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 1000; }
        .btn-footer { text-decoration: none; color: #333; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="copertina-container">
        <a href="index.html" class="btn-nav">⬅ HOME</a>
        <img src="immagini/scuola.jpg" class="foto-scuola">
        <div class="firma-francesco">Archivio Francesco</div>
    </div>

    <div id="gallery" class="container-gallery"></div>

    <div class="footer-nav">
        <a href="index.html" class="btn-footer">🏠 Home</a>
        <a href="francesco.html" class="btn-footer">📚 Archivio</a>
        <a href="gestione_francesco.html" class="btn-footer">⚙️ Gestione</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9EnZdjEVxZLIc",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        
        firebase.database().ref('archivio_francesco').on('value', (snap) => {
            const container = document.getElementById('gallery');
            container.innerHTML = "";
            const dati = snap.val();
            if (dati) {
                Object.keys(dati).reverse().forEach((id) => {
                    const post = dati[id];
                    let visual = "";
                    
                    if (post.immagine && post.immagine.trim() !== "") {
                        let input = post.immagine.trim();
                        let linkPulito = input;

                        // 1. Prova a vedere se è un codice HTML (da ImgBB)
                        const regexImg = /src="([^"]+)"/;
                        const match = input.match(regexImg);
                        if (match && match[1]) {
                            linkPulito = match[1];
                        }

                        // 2. Gestione YouTube
                        if (linkPulito.includes('youtube.com') || linkPulito.includes('youtu.be')) {
                            let vId = "";
                            if (linkPulito.includes('v=')) {
                                vId = linkPulito.split('v=')[1].split('&')[0];
                            } else {
                                vId = linkPulito.split('/').pop().split('?')[0];
                            }
                            visual = `<iframe src="https://www.youtube.com/embed/${vId}" allowfullscreen></iframe>`;
                        } else { 
                            // 3. Gestione Immagine normale
                            visual = `<img src="${linkPulito}" alt="Foto">`; 
                        }
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        ${visual}
                        <h3>${post.titolo || ''}</h3>
                        <p>${post.testo || ''}</p>
                    `;
                    container.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
