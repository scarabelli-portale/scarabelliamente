<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREA PRESIDENZA - Francesco Mariani</title>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f4f4f2; margin: 0; padding: 0; color: #1a1a1a; }
        
        /* TESTATA CON FOTO SCUOLA */
        .copertina-container { position: relative; width: 100%; max-width: 1300px; margin: 0 auto; height: 200px; overflow: hidden; border-bottom: 5px solid #0056b3; background: #000; }
        .foto-scuola { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; opacity: 0.8; }
        
        .container { max-width: 850px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #0056b3; }
        
        header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 20px; }
        h1 { color: #0056b3; margin: 0; text-transform: uppercase; font-size: 2rem; }
        
        .post { margin-bottom: 50px; padding-bottom: 30px; border-bottom: 2px solid #f0f0f0; position: relative; }
        .post img { width: 100%; max-height: 500px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .post h2 { color: #2c3e50; margin: 10px 0; font-size: 1.6rem; line-height: 1.2; }
        
        .testo-post { 
            line-height: 1.6; 
            font-size: 1.1rem; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            color: #333;
            text-align: left;
        }
        
        /* STILE PULSANTE VIDEO CLONATI */
        .box-video-clone {
            background: #f0f4f8; 
            padding: 20px; 
            border-radius: 10px; 
            border: 2px dashed #0056b3; 
            text-align: center; 
            margin-bottom: 15px;
        }
        .btn-guarda-video {
            display: inline-block;
            background: #0056b3;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-family: Arial, sans-serif;
            margin-top: 10px;
        }

        .data { color: #999; font-size: 0.85rem; font-family: Arial, sans-serif; margin-bottom: 5px; }
        .torna { display: inline-block; margin: 20px; text-decoration: none; color: #0056b3; font-weight: bold; font-family: Arial, sans-serif; }
        
        @media (max-width: 600px) {
            .copertina-container { height: 120px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="copertina-container">
        <img src="immagini/scuola.jpg" class="foto-scuola">
    </div>

    <a href="index.html" class="torna">← Torna alla Home</a>

    <div class="container">
        <header>
            <h1>EDITORIALI E NEWS</h1>
            <p style="font-style: italic; color: #666;">A cura del Presidente Francesco Mariani</p>
        </header>

        <div id="contenitore-post">
            <p style="text-align:center;">Caricamento contenuti...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // Funzione magica per l'ID YouTube
        function ottieniYoutubeID(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }

        db.ref('archivioCentrale').on('value', (snap) => {
            const contenitore = document.getElementById('contenitore-post');
            contenitore.innerHTML = ""; 
            
            if (!snap.exists()) {
                contenitore.innerHTML = "<p style='text-align:center;'>Nessun editoriale pubblicato.</p>";
                return;
            }

            let listaPost = [];
            snap.forEach(child => {
                listaPost.push(child.val());
            });

            listaPost.reverse().forEach(p => {
                const foto = p.immagine || p.urlImmagine;
                const videoUrl = p.video || p.urlVideo;
                let vId = ottieniYoutubeID(videoUrl);

                let mediaHtml = "";
                if (vId) {
                    // Se c'è un video, mettiamo il pulsante "Guarda il Video"
                    mediaHtml = `
                        <div class="box-video-clone">
                            <p style="margin:0; font-weight:bold; color:#0056b3;">🎥 CONTENUTO VIDEO</p>
                            <a href="https://www.youtube.com/watch?v=${vId}" target="_blank" class="btn-guarda-video">GUARDA IL VIDEO</a>
                        </div>`;
                } else if (foto) {
                    // Altrimenti mettiamo la foto
                    mediaHtml = `<img src="${foto}">`;
                }

                const htmlPost = `
                    <div class="post">
                        ${mediaHtml}
                        <div class="data">${p.data || ''}</div>
                        <h2>${p.titolo}</h2>
                        <div class="testo-post">${p.testo}</div>
                    </div>
                `;
                contenitore.innerHTML += htmlPost;
            });
        });
    </script>
</body>
</html>
