<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Francesco - SCARABELLIAMENTE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #0056b3; text-transform: uppercase; }
        .griglia-archivio { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #000; }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333; }
        .card-text { font-size: 0.9rem; color: #666; margin-bottom: 15px; flex-grow: 1; }
        .btn-apri { background: #0056b3; color: white; text-decoration: none; text-align: center; padding: 10px; border-radius: 6px; font-weight: bold; }
        .nav-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #0056b3; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="nav-link">← Torna alla Home</a>
    <h1>Archivio Francesco Mariani</h1>
    <div id="griglia-archivio" class="griglia-archivio">
        </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // Funzione per ripulire i link (YouTube, ImgBB o link diretti)
    function pulisciImmagine(sorgente) {
        if (!sorgente) return "immagini/francesco.jpg";
        
        let link = sorgente.trim();

        // 1. Gestione YouTube: estrae la miniatura
        if (link.includes('youtube.com') || link.includes('youtu.be')) {
            let vid = "";
            if (link.includes('v=')) { vid = link.split('v=')[1].split('&')[0]; }
            else { vid = link.split('/').pop().split('?')[0]; }
            return `https://img.youtube.com/vi/${vid}/hqdefault.jpg`;
        }

        // 2. Gestione ImgBB: estrae il link dal codice HTML
        if (link.includes('<img')) {
            const match = link.match(/src="([^"]+)"/);
            if (match) return match[1];
        }

        return link;
    }

   db.ref('archivio_francesco').on('value', snap => {
        const griglia = document.getElementById('griglia-archivio');
        griglia.innerHTML = "";
        
        let postArray = [];
        snap.forEach(child => { postArray.push({id: child.key, ...child.val()}); });
        postArray.reverse();

        postArray.forEach(post => {
            const foto = pulisciImmagine(post.immagine);
            
            // CONTROLLO: Se il link originale è YouTube, prepariamo l'apertura esterna
            const isYouTube = post.immagine.includes('youtube.com') || post.immagine.includes('youtu.be');
            const linkAzione = isYouTube ? post.immagine : `view.html?id=${post.id}&area=archivio_francesco`;
            const target = isYouTube ? 'target="_blank"' : '';

            const card = `
                <div class="card">
                    <a href="${linkAzione}" ${target} style="display:block; line-height:0;">
                        <img src="${foto}" onerror="this.src='immagini/francesco.jpg'">
                    </a>
                    <div class="card-body">
                        <div class="card-title">${post.titolo}</div>
                        <div class="card-text">${post.testo || ""}</div>
                        <a href="${linkAzione}" ${target} class="btn-apri">
                            ${isYouTube ? 'GUARDA VIDEO' : 'LEGGI TUTTO'}
                        </a>
                    </div>
                </div>
            `;
            griglia.innerHTML += card;
        });
    });
</script>

</body>
</html>
