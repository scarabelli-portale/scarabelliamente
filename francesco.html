<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVIO SCARABELLI - Francesco</title>
    <style>
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; color: #1a1a1a; }
        
        /* TESTATA SCUOLA */
        .copertina-container { position: relative; width: 100%; max-width: 1300px; margin: 0 auto; height: 280px; overflow: hidden; border-bottom: 5px solid #0056b3; }
        .foto-scuola { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; }
        #scritta-animata { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 10px rgba(0,0,0,1); text-transform: uppercase; letter-spacing: 4px; white-space: nowrap; z-index: 10; }
        
        /* NAV-BAR CON FOTINA E PULSANTE CENTRATO */
        .nav-bar { 
            max-width: 900px; 
            margin: 15px auto; 
            display: flex; 
            align-items: center; 
            background: white; 
            padding: 0 20px; 
            border-radius: 50px; 
            border: 1px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative; 
            height: 50px; 
        }
        .identita-redattore { display: flex; align-items: center; gap: 10px; z-index: 1; }
        .foto-redattore-mini { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #0056b3; object-fit: cover; }
        .nome-redattore { font-size: 0.8rem; font-weight: bold; color: #0056b3; text-transform: uppercase; letter-spacing: 1px; }

        .btn-home { 
            position: absolute; left: 50%; transform: translateX(-50%);
            background: #0056b3; color: white; padding: 4px 12px; 
            text-decoration: none; border-radius: 20px; 
            font-weight: bold; font-size: 0.6rem; text-transform: uppercase;
            transition: 0.3s; white-space: nowrap;
        }
        .btn-home:hover { background: #2c3e50; transform: translateX(-50%) scale(1.05); }

        /* SEZIONE SPECIALE MINISTRO POLETTI */
        .box-speciale { 
            max-width: 860px; margin: 10px auto 25px auto; 
            background: white; border: 1px solid #ddd; border-top: 4px solid #0056b3; 
            padding: 20px; border-radius: 8px; text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .foto-poletti { 
            width: 130px; border: 2px solid #0056b3; border-radius: 4px; 
            transition: transform 0.5s ease; cursor: zoom-in; 
        }
        .foto-poletti:hover { transform: scale(1.6); z-index: 100; position: relative; }

        /* ARTICOLI */
        .main-container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        .box-articolo { background: white; border: 1px solid #ddd; border-left: 6px solid #0056b3; padding: 25px; border-radius: 8px; margin-bottom: 25px; }
        h1 { color: #0056b3; font-size: 1.7rem; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        @media (max-width: 850px) { .copertina-container { height: 160px; } #scritta-animata { font-size: 1.2rem; } .nome-redattore { display: none; } }
    </style>
</head>
<body>

    <div class="copertina-container">
        <img src="immagini/scuola.jpg" class="foto-scuola">
        <div id="scritta-animata"></div> 
    </div>

    <div class="nav-bar">
        <div class="identita-redattore">
            <img src="immagini/francesco.jpg" class="foto-redattore-mini" onerror="this.src='immagini/scuola.jpg'">
            <span class="nome-redattore">Francesco</span>
        </div>
        <a href="index.html" class="btn-home">Home Page</a>
        <div style="flex: 1;"></div>
    </div>

    <div class="box-speciale">
        <div style="font-size: 0.7rem; font-weight: bold; color: #0056b3; margin-bottom: 15px; text-transform: uppercase;">Incontri Istituzionali</div>
        <img src="immagini/poletti.jpg" class="foto-poletti" alt="Ministro Poletti" onerror="this.style.display='none'">
        <p style="font-style: italic; color: #666; font-size: 0.85rem; margin-top: 15px;">
            "Il Ministro Poletti in visita allo Scarabelli: un momento storico per l'archivio digitale."
        </p>
        <div style="text-align: center; letter-spacing: 10px; font-size: 20px; color: #000; padding-top: 5px;">...</div>
    </div>

    <div class="main-container">
        <div id="lista-articoli"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9enZdjEVxZLic",
            authDomain: "sito-sergio-b19ce.firebaseapp.com",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sito-sergio-b19ce",
            storageBucket: "sito-sergio-b19ce.firebasestorage.app",
            messagingSenderId: "194311505630",
            appId: "1:194311505630:web:ceb9aead0f020c3697a44f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const articoliRef = ref(db, 'archivioFrancesco'); 

        onValue(articoliRef, (snapshot) => {
            const container = document.getElementById("lista-articoli");
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().forEach(art => {
                    container.innerHTML += `
                        <div class="box-articolo">
                            <span style="font-size:0.75rem; color:#888;">Data: ${art.data || ''}</span>
                            <h1>${art.titolo}</h1>
                            <div style="font-size:1.1rem; text-align:justify; white-space:pre-wrap;">${art.testo}</div>
                        </div>`;
                });
            }
        });

        const testoScritta = "ARCHIVIO DIGITALE";
        let j = 0;
        function animaTitolo() {
            const el = document.getElementById("scritta-animata");
            if (el && j < testoScritta.length) {
                el.innerHTML += testoScritta.charAt(j);
                j++;
                setTimeout(animaTitolo, 130);
            }
        }
        window.onload = animaTitolo;
    </script>
</body>
</html>
