<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Francesco - SCARABELLIAMENTE</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f2; margin: 0; padding: 20px; padding-bottom: 80px; }
        h2 { text-align: center; color: #143ca0; margin-bottom: 30px; }
        
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid #143ca0; }
        .card-content { padding: 15px; }
        .card-content h3 { margin: 0 0 10px; color: #143ca0; font-size: 1.2rem; }
        .card-content p { color: #555; font-size: 0.9rem; height: 40px; overflow: hidden; }

        /* --- FINESTRA MAGICA (MODAL) STILE SERGIO --- */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background-color: #fefefe; margin: 5% auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 800px; position: relative; }
        .close { position: absolute; top: 10px; right: 20px; color: #aaa; font-size: 35px; font-weight: bold; cursor: pointer; }
        .modal-media img, .modal-media iframe { width: 100%; border-radius: 10px; }
        .modal-text { margin-top: 20px; line-height: 1.6; color: #333; white-space: pre-wrap; }

        /* BARRA NAVIGAZIONE */
        .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 999; }
        .btn-footer { text-decoration: none; color: #143ca0; font-weight: bold; padding: 8px 15px; border: 1px solid #143ca0; border-radius: 20px; background: #f0f7ff; }
    </style>
</head>
<body>

<h2>📚 Archivio Storico Francesco</h2>

<div class="container" id="archivio-grid">
    </div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="chiudiModal()">&times;</span>
        <div id="modal-media" class="modal-media"></div>
        <h2 id="modal-titolo" style="text-align:left; margin-top:20px;"></h2>
        <div id="modal-testo" class="modal-text"></div>
        <button onclick="chiudiModal()" style="margin-top:20px; padding:10px; background:#143ca0; color:white; border:none; border-radius:5px; width:100%; cursor:pointer; font-weight:bold;">CHIUDI</button>
    </div>
</div>

<div class="footer-nav">
    <a href="index.html" class="btn-footer">🏠 Home</a>
    <a href="gestione_francesco.html" class="btn-footer">✍️ Scrivi</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9EnZdjEVxZLIc",
        databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" 
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    function caricaArchivio() {
        database.ref('archivio_francesco').on('value', (snap) => {
            const grid = document.getElementById('archivio-grid');
            grid.innerHTML = "";
            const dati = snap.val();
            if (dati) {
                Object.keys(dati).reverse().forEach((id) => {
                    const post = dati[id];
                    let imgPura = post.immagine;
                    // Pulizia link ImgBB
                    if (imgPura.includes('<img')) {
                        const m = imgPura.match(/src="([^"]+)"/);
                        if (m) imgPura = m[1];
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => apriModal(post.titolo, post.testo, imgPura);
                    
                    card.innerHTML = `
                        <img src="${imgPura}" onerror="this.src='immagini/francesco.jpg'">
                        <div class="card-content">
                            <h3>${post.titolo}</h3>
                            <p>${post.testo || ""}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        });
    }

    function apriModal(titolo, testo, media) {
        const modal = document.getElementById("myModal");
        const mMedia = document.getElementById("modal-media");
        document.getElementById("modal-titolo").innerText = titolo;
        document.getElementById("modal-testo").innerText = testo || "";

        if (media.includes('youtube.com') || media.includes('youtu.be')) {
            let vid = media.includes('v=') ? media.split('v=')[1].split('&')[0] : media.split('/').pop();
            mMedia.innerHTML = `<iframe height="315" src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen></iframe>`;
        } else {
            mMedia.innerHTML = `<img src="${media}">`;
        }
        modal.style.display = "block";
    }

    function chiudiModal() {
        document.getElementById("myModal").style.display = "none";
        document.getElementById("modal-media").innerHTML = "";
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById("myModal")) { chiudiModal(); }
    }

    caricaArchivio();
</script>

</body>
</html>
