<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDAZIONE CARLO - GESTIONE</title>
    <style>
        body { font-family: sans-serif; background: #0056b3; color: white; text-align: center; padding: 10px; margin: 0; }
        .box { width: 95%; max-width: 550px; margin: 20px auto; background: white; color: #333; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-top: 6px solid #ff9800; text-align: left; box-sizing: border-box; }
        
        /* STILE LOGIN */
        #area-login { margin-top: 100px; text-align: center; }
        .login-box { background: white; padding: 30px; border-radius: 15px; display: inline-block; color: #333; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-entra { background: #0056b3; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }

        label { font-weight: bold; color: #0056b3; display: block; margin-top: 15px; }
        input, textarea { width: 100%; margin: 5px 0 15px 0; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        
        .box-foto-diretta { background: #e3f2fd; border: 2px solid #0056b3; padding: 15px; border-radius: 12px; margin: 15px 0; text-align: center; }
        .input-file-nascosto { display: none; }
        .btn-cellulare { background: #0056b3; color: white; padding: 12px; display: block; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .btn-imgbb { background: #ff9800; color: white; padding: 12px; display: block; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; text-align: center; margin-bottom: 10px; }
        #anteprima { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 2px solid #0056b3; }
        
        #pubblica { background: #2e7d32; color: white; border: none; padding: 18px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 1.2rem; margin-top: 10px; }
        .riga-post { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; color: #333; background: #f9f9f9; margin-bottom: 5px; border-radius: 5px; font-size: 0.9rem; }
        .btn-elimina { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div id="area-login">
    <div class="login-box">
        <h2 style="color:#0056b3; margin-top:0;">Accesso Carlo 📚</h2>
        <input type="password" id="pass" placeholder="Inserisci Password">
        <button class="btn-entra" onclick="login()">ENTRA</button>
    </div>
</div>

<div id="redazione" style="display:none;">
    <div class="box">
        <h2 style="color:#0056b3; margin-top:0; text-align:center;">✍️ Redazione di Carlo</h2>
        
        <label>✍️ Titolo Notizia</label>
        <input type="text" id="tit" placeholder="Inserisci il titolo...">
        
        <label>📝 Racconto / Descrizione</label>
        <textarea id="tes" rows="5" placeholder="Scrivi qui l'articolo..."></textarea>
        
        <div class="box-foto-diretta">
            <label style="color:#0056b3; margin-top:0;">📸 GESTIONE IMMAGINE</label>
            <label for="foto-file" class="btn-cellulare">📷 SCATTA O CARICA FOTO</label>
            <input type="file" id="foto-file" class="input-file-nascosto" accept="image/*" onchange="anteprimaFoto(this)">
            
            <a href="https://imgbb.com/" target="_blank" class="btn-imgbb">🔗 USA LINK IMGBB</a>
            
            <img id="anteprima" src="" alt="Anteprima">
            <input type="text" id="img-link" placeholder="Incolla link qui se hai usato ImgBB...">
        </div>
        
        <button id="pubblica" onclick="invia()">🚀 PUBBLICA ORA</button>
        
        <h3 style="color:#0056b3; margin-top:30px; border-top:1px solid #ddd; padding-top:15px;">🗑️ I tuoi post</h3>
        <div id="lista-post"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();
    let immagineBase64 = ""; 

    // FUNZIONE LOGIN
    function login() {
        if (document.getElementById('pass').value === "123") {
            document.getElementById('area-login').style.display = 'none';
            document.getElementById('redazione').style.display = 'block';
        } else {
            alert("Password Errata!");
        }
    }

    function anteprimaFoto(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('anteprima').src = e.target.result;
                document.getElementById('anteprima').style.display = 'block';
                immagineBase64 = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function invia() {
        let t = document.getElementById('tit').value;
        let s = document.getElementById('tes').value;
        let linkEsterno = document.getElementById('img-link').value.trim();
        
        if (linkEsterno.includes('<img src="')) {
            linkEsterno = linkEsterno.split('<img src="')[1].split('"')[0];
        }

        let fotoFinale = immagineBase64 ? immagineBase64 : linkEsterno;

        if(!t || !fotoFinale) return alert("Metti almeno un titolo e una foto!");

        database.ref('archivioCarlo').push({
            titolo: t, testo: s, urlImmagine: fotoFinale, data: new Date().toLocaleString('it-IT')
        }).then(() => {
            alert("✅ PUBBLICATO!");
            document.getElementById('tit').value = "";
            document.getElementById('tes').value = "";
            document.getElementById('img-link').value = "";
            document.getElementById('anteprima').style.display = "none";
            immagineBase64 = "";
        });
    }

    database.ref('archivioCarlo').on('value', (snapshot) => {
        const c = document.getElementById('lista-post'); 
        c.innerHTML = "";
        const data = snapshot.val();
        if(data){
            Object.keys(data).reverse().forEach((key) => {
                c.insertAdjacentHTML('afterbegin', `
                    <div class="riga-post">
                        <span>• ${data[key].titolo}</span>
                        <button class="btn-elimina" onclick="eliminaPost('${key}')">X</button>
                    </div>
                `);
            });
        }
    });

    function eliminaPost(id) {
        if(confirm("Vuoi eliminare questo post?")) {
            database.ref('archivioCarlo/' + id).remove();
        }
    }
</script>
</body>
</html>
