<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>REDAZIONE CINZIA - GESTIONE</title>
    <style>
        body { font-family: sans-serif; background: #1b5e20; color: white; text-align: center; padding: 20px; }
        .box { max-width: 550px; margin: auto; background: white; color: #333; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-top: 6px solid #27ae60; text-align: left; }
        label { font-weight: bold; color: #1b5e20; display: block; margin-top: 15px; }
        input, textarea { width: 100%; margin: 5px 0 15px 0; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        
        /* BOX FOTO DAL CELLULARE */
        .box-foto-diretta { background: #e8f5e9; border: 2px solid #27ae60; padding: 15px; border-radius: 12px; margin: 15px 0; text-align: center; }
        .input-file-nascosto { display: none; }
        .btn-cellulare { background: #27ae60; color: white; padding: 12px; display: block; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        #anteprima { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
        
        #pubblica { background: #2e7d32; color: white; border: none; padding: 18px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 1.2rem; }
        .riga-post { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; color: #333; font-size: 0.8rem;}
        #area-login { margin-top: 100px; text-align: center; }
        .login-box { background: white; padding: 30px; border-radius: 15px; display: inline-block; color: #333; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div id="area-login">
    <div class="login-box">
        <h2 style="color:#1b5e20;">Gestione Carlo 📚</h2>
        <input type="password" id="pass" placeholder="Password (123)">
        <button onclick="login()" style="background:#1b5e20; color:white; border:none; padding:10px; border-radius:5px; width:100%; cursor:pointer; font-weight:bold;">ENTRA</button>
    </div>
</div>

<div id="redazione" style="display:none;">
    <div class="box">
        <h2 style="color:#1b5e20; margin-top:0; text-align:center;">✍️ Redazione di carlo</h2>
        
        <label>✍️ Titolo</label>
        <input type="text" id="tit" placeholder="Titolo...">
        
        <label>📝 Racconto</label>
        <textarea id="tes" rows="5" placeholder="Scrivi qui..."></textarea>
        
        <div class="box-foto-diretta">
            <label style="color:#27ae60; margin-top:0;">📸 CARICA DAL CELLULARE</label>
            <label for="foto-file" class="btn-cellulare">📁 SCEGLI FOTO O SCATTA</label>
            <input type="file" id="foto-file" class="input-file-nascosto" accept="image/*" onchange="anteprimaFoto(this)">
            <img id="anteprima" src="" alt="Anteprima">
            
            <p style="font-size: 0.7rem; color: #666; margin: 15px 0 5px 0;">🎥 OPPURE INCOLLA LINK (YOUTUBE/IMGBB):</p>
            <input type="text" id="img-link" placeholder="Incolla link qui...">
        </div>
        
        <button id="pubblica" onclick="invia()">🚀 PUBBLICA ORA</button>
        
        <div id="lista-post" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();
    let immagineBase64 = ""; // Qui salviamo la foto del cellulare

    function login() {
        if (document.getElementById('pass').value === "123") {
            sessionStorage.setItem("cinziaAmmesso", "si");
            mostraRedazione();
        } else { alert("Password Errata"); }
    }

    function mostraRedazione() {
        document.getElementById('area-login').style.display = 'none';
        document.getElementById('redazione').style.display = 'block';
    }

    // Funzione magica per leggere la foto dal cellulare
    function anteprimaFoto(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('anteprima').src = e.target.result;
                document.getElementById('anteprima').style.display = 'block';
                immagineBase64 = e.target.result; // Salva la foto come testo lungo
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function invia() {
        let t = document.getElementById('tit').value;
        let s = document.getElementById('tes').value;
        let linkEsterno = document.getElementById('img-link').value.trim();
        
        // Se c'è una foto dal cellulare usa quella, altrimenti usa il link incollato
        let fotoFinale = immagineBase64 ? immagineBase64 : linkEsterno;

        if(!t) return alert("Metti un titolo!");

        database.ref('archivioCinzia').push({
            titolo: t, testo: s, immagine: fotoFinale, data: new Date().toLocaleString()
        }).then(() => {
            alert("✅ PUBBLICATO!");
            window.location.href = "cinzia.html";
        });
    }

    // (Qui sotto la solita funzione per la lista post...)
    database.ref('archivioCinzia').on('value', (snapshot) => {
        const c = document.getElementById('lista-post'); c.innerHTML = "";
        snapshot.forEach((child) => {
            c.insertAdjacentHTML('afterbegin', `<div class="riga-post"><span>• ${child.val().titolo}</span><button onclick="database.ref('archivioCinzia/${child.key}').remove()">X</button></div>`);
        });
    });
</script>
</body>
</html>
