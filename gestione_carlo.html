<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTIONE CARLO - Area Riservata</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h2 { color: #0056b3; text-align: center; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        /* BOX ARANCIONE IDENTICO AL TUO SCREENSHOT */
        .box-upload { border: 2px dashed #f39c12; padding: 15px; border-radius: 10px; margin: 20px 0; text-align: center; background-color: #fffaf0; }
        .btn-arancio { background-color: #e67e22; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        /* BOTTONE PUBBLICA VERDE */
        .btn-pubblica { background-color: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        
        /* LISTA ELIMINA */
        .riga-articolo { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: #fff; }
        .btn-elimina { background: #dc3545; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #blocco-gestione { display: none; }
        #login-box { text-align: center; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-box">
        <h2>🔐 ACCESSO CARLO</h2>
        <input type="password" id="pass-field" placeholder="Inserisci Password..." style="text-align:center; font-size:1.2rem;">
        <button class="btn-pubblica" onclick="verifica()">ENTRA</button>
    </div>

    <div id="blocco-gestione">
        <h2>✍️ NUOVA ANALISI</h2>
        <input type="text" id="titolo" placeholder="TITOLO DELL'ARTICOLO">
        <input type="text" id="data-art" placeholder="DATA (es. 17 Aprile)">
        <textarea id="testo" rows="8" placeholder="SCRIVI QUI IL TESTO..."></textarea>

        <div class="box-upload">
            <p style="color:#e67e22; font-weight:bold; margin:0 0 10px 0;">📷 1. CARICA LA FOTO SU IMGBB</p>
            <button class="btn-arancio" onclick="window.open('https://imgbb.com/upload', '_blank')">APRI NUVOLETTA BLU ☁️</button>
            <p style="font-size:0.8rem; color:#666; margin-top:15px;">📷 2. INCOLLA QUI IL "LINK DIRETTO":</p>
            <input type="text" id="link-foto" placeholder="Incolla qui il link della foto...">
        </div>

        <button class="btn-pubblica" onclick="pubblica()">🚀 PUBBLICA SUL SITO</button>
        <button onclick="location.href='carlo.html'" style="width:100%; margin-top:10px; padding:10px; border:none; background:#6c757d; color:white; border-radius:5px; cursor:pointer;">GUARDA IL SITO</button>

        <h3 style="margin-top:40px; color:#555; text-align:center;">🗑️ ELIMINA ARTICOLI</h3>
        <div id="lista-articoli"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.verifica = function() {
        if (document.getElementById('pass-field').value === "olrac") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('blocco-gestione').style.display = 'block';
            caricaLista();
        } else { alert("Password errata!"); }
    }

    window.pubblica = function() {
        const t = document.getElementById('titolo').value;
        const d = document.getElementById('data-art').value;
        const txt = document.getElementById('testo').value;
        const img = document.getElementById('link-foto').value;

        if (t === "" || txt === "") return alert("Manca il titolo o il testo!");

        push(ref(db, 'archivioCarlo'), {
            titolo: t,
            data: d,
            testo: txt,
            urlImmagine: img
        }).then(() => {
            alert("✅ Articolo pubblicato con successo!");
            document.getElementById('titolo').value = "";
            document.getElementById('testo').value = "";
            document.getElementById('link-foto').value = "";
        });
    }

    function caricaLista() {
        onValue(ref(db, 'archivioCarlo'), (snap) => {
            const list = document.getElementById('lista-articoli');
            list.innerHTML = "";
            const data = snap.val();
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    list.innerHTML += `
                        <div class="riga-articolo">
                            <span><strong>${data[id].titolo}</strong></span>
                            <button class="btn-elimina" onclick="elimina('${id}')">ELIMINA</button>
                        </div>`;
                });
            }
        });
    }

    window.elimina = function(id) {
        if(confirm("Vuoi eliminare definitivamente questo articolo?")) {
            remove(ref(db, 'archivioCarlo/' + id));
        }
    }
</script>

</body>
</html>
