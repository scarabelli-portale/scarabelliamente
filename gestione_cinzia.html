<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>REDAZIONE CINZIA - GESTIONE</title>
    <style>
        body { font-family: sans-serif; background: #27ae60; color: white; text-align: center; padding: 20px; }
        .box { max-width: 550px; margin: auto; background: white; color: #333; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-top: 6px solid #FFD700; }
        input, textarea { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .box-foto { background: #fdf2e9; border: 2px dashed #e67e22; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .btn-carica { background: #e67e22; color: white; padding: 15px; display: block; text-decoration: none; font-weight: bold; border-radius: 8px; font-size: 1.1rem; transition: 0.3s; }
        .btn-carica:hover { background: #d35400; }
        #pubblica { background: #27ae60; color: white; border: none; padding: 18px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 1.3rem; }
        .sezione-lista { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; text-align: left; }
        .riga-post { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.8rem; color: #333; }
        .btn-elimina { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        #area-login { margin-top: 100px; }
        .login-box { background: white; padding: 30px; border-radius: 15px; display: inline-block; color: #333; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div id="area-login">
    <div class="login-box">
        <h2 style="color:#27ae60;">Area Cinzia ✍️</h2>
        <input type="password" id="pass" placeholder="Password di accesso">
        <button onclick="login()" style="background:#27ae60; color:white; border:none; padding:10px; border-radius:5px; width:100%; cursor:pointer;">ENTRA</button>
    </div>
</div>

<div id="redazione" style="display:none;">
    <div class="box">
        <h2 style="color:#27ae60; margin-top:0;">✍️ Redazione di Cinzia</h2>
        <input type="text" id="tit" placeholder="TITOLO DEL RACCONTO">
        <textarea id="tes" rows="5" placeholder="SCRIVI QUI IL TUO TESTO..."></textarea>
        
        <div class="box-foto">
            <p style="color:#e67e22; font-weight:bold; margin-top:0;">📸 1. CARICA LA FOTO</p>
            <a href="https://imgbb.com/upload" target="_blank" class="btn-carica">CLICCA QUI E CARICA</a>
            <p style="font-size: 0.75rem; color: #666; margin: 15px 0 5px 0;">📸 2. INCOLLA IL LINK:</p>
            <input type="text" id="img" placeholder="Incolla il link (es. https://ibb.co/...)">
        </div>
        
        <button id="pubblica" onclick="invia()">🚀 PUBBLICA ARTICOLO</button>

        <div class="sezione-lista">
            <h3 style="color:#27ae60; text-align:center;">🗑️ GESTIONE ARTICOLI</h3>
            <div id="lista-post"></div>
        </div>
        <button onclick="location.href='cinzia.html'" style="background:#888; color:white; border:none; padding:10px; border-radius:8px; width:100%; margin-top:15px; cursor:pointer;">TORNA AL SITO</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9EnZdjEVxZLIc",
        authDomain: "sito-sergio-b19ce.firebaseapp.com",
        databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "sito-sergio-b19ce"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    // --- FUNZIONE MEMORIA PASSWORD ---
    window.onload = function() {
        if (sessionStorage.getItem("login_cinzia") === "ok") {
            document.getElementById('area-login').style.display = 'none';
            document.getElementById('redazione').style.display = 'block';
        }
    };

    function login() {
        const p = document.getElementById('pass').value;
        if (p === "aiznic") {
            sessionStorage.setItem("login_cinzia", "ok"); // Salva l'accesso
            document.getElementById('area-login').style.display = 'none';
            document.getElementById('redazione').style.display = 'block';
        } else { alert("Password Errata"); }
    }

    function invia() {
        let t = document.getElementById('tit').value;
        let s = document.getElementById('tes').value;
        let iRaw = document.getElementById('img').value;

        if(!t) { alert("Metti un titolo!"); return; }

        let immaginePulita = iRaw.trim();
        if (immaginePulita.includes('<img src="')) {
            immaginePulita = immaginePulita.split('<img src="')[1].split('"')[0];
        } else if (immaginePulita.includes('[img]')) {
            immaginePulita = immaginePulita.split('[img]')[1].split('[/img]')[0];
        }

        database.ref('archivioCinzia').push({
            titolo: t, 
            testo: s, 
            immagine: immaginePulita, 
            data: new Date().toLocaleString()
        }).then(() => {
            alert("✅ PUBBLICATO CON SUCCESSO!");
            window.location.href = "cinzia.html"; 
        });
    }

    database.ref('archivioCinzia').on('value', (snapshot) => {
        const contenitore = document.getElementById('lista-post');
        contenitore.innerHTML = "";
        snapshot.forEach((child) => {
            const post = child.val();
            const id = child.key;
            contenitore.insertAdjacentHTML('afterbegin', `
                <div class="riga-post">
                    <span>• ${post.titolo}</span>
                    <button class="btn-elimina" onclick="eliminaPost('${id}')">ELIMINA</button>
                </div>
            `);
        });
    });

    function eliminaPost(id) {
        if(confirm("Vuoi davvero cancellare questo articolo?")) {
            database.ref('archivioCinzia/' + id).remove();
        }
    }
</script>
</body>
</html>
