<DOCTYPE html>
<html lang="it" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redazione di Cinzia</title>
    <style>
        body { font-family: sans-serif; background-color: #27ae60; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-top: 5px solid #f1c40f; }
        #area-login { text-align: center; padding: 20px 0; }
        #area-gestione { display: none; }
        
        h2 { color: #003366; text-align: center; margin-bottom: 20px; font-size: 22px; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }

        /* BOX CARICAMENTO FOTO SEMPLIFICATO */
        .box-upload { border: 2px dashed #e67e22; padding: 15px; border-radius: 12px; margin: 15px 0; text-align: center; background: #fff9f4; }
        
        /* TASTO SCATTA FOTO */
        .btn-camera { background-color: #e67e22; color: white; padding: 15px; border-radius: 8px; display: block; font-weight: bold; margin: 10px 0; border: none; width: 100%; font-size: 18px; cursor: pointer; }
        
        /* INPUT NASCOSTO CHE ATTIVA LA FOTOCAMERA */
        #file-input { display: none; }

        .btn-pubblica { background-color: #27ae60; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .lista-post { margin-top: 30px; border-top: 1px solid #eee; }
        .item-post { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-elimina { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGIN -->
    <div id="area-login">
        <h2>✍️ Accesso Gestione Cinzia</h2>
        <input type="password" id="pass-input" placeholder="Inserisci Password">
        <button class="btn-pubblica" onclick="controllaPass()">ENTRA</button>
    </div>

    <!-- REDAZIONE -->
    <div id="area-gestione">
        <h2>✍️ Redazione di Cinzia</h2>
        
        <input type="text" id="titolo" placeholder="TITOLO DEL RACCONTO">
        <textarea id="testo" rows="5" placeholder="SCRIVI QUI IL TUO TESTO..."></textarea>
        
        <!-- CARICA FOTO SEMPLIFICATO -->
        <div class="box-upload">
            <span style="font-size: 14px; color: #e67e22; font-weight: bold;">📷 GESTIONE IMMAGINE</span>
            
            <!-- Tasto che apre la fotocamera o galleria -->
            <button class="btn-camera" onclick="document.getElementById('file-input').click()">📸 SCATTA FOTOGRAFIA / CARICA</button>
            <input type="file" id="file-input" accept="image/*">
            
            <p style="font-size: 11px; color: #666;">Oppure incolla un link (YouTube o Web) qui sotto:</p>
            <input type="text" id="immagine" placeholder="Incolla link qui...">
        </div>

        <button class="btn-pubblica" onclick="pubblica()">🚀 PUBBLICA ORA</button>

        <div class="lista-post">
            <h3 style="text-align: center; color: #003366;">🗑️ I TUOI POST ONLINE</h3>
            <div id="visualizza-post"></div>
        </div>
        
        <button style="background:none; border:none; color:#999; width:100%; margin-top:20px; cursor:pointer;" onclick="window.location.href='index.html'">🏠 Torna alla Home</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database().ref('archivioCinzia');

    function controllaPass() {
        if (document.getElementById('pass-input').value.toLowerCase() === 'aiznic') { 
            document.getElementById('area-login').style.display = 'none';
            document.getElementById('area-gestione').style.display = 'block';
            caricaPost();
        } else { alert("Password Errata!"); }
    }

    // Nota: Il caricamento reale del file richiede un servizio di storage (come ImgBB o Firebase Storage).
    // Questo tasto al momento "seleziona" il file. Se vuoi che lo carichi AUTOMATICAMENTE su ImgBB senza 
    // che tu faccia nulla, serve una "chiave API" di ImgBB. Per ora l'ho lasciato pronto per il link manuale
    // ma con il tasto che attiva la fotocamera come avevi prima.

    function pubblica() {
        const t = document.getElementById('titolo').value;
        const txt = document.getElementById('testo').value;
        const img = document.getElementById('immagine').value;
        if (!t) return alert("Inserisci il titolo!");

        db.push({
            titolo: t,
            testo: txt,
            immagine: img,
            data: new Date().toISOString()
        }).then(() => {
            alert("Post pubblicato!");
            location.reload();
        });
    }

    function caricaPost() {
        db.limitToLast(10).on('value', snap => {
            const container = document.getElementById('visualizza-post');
            container.innerHTML = "";
            snap.forEach(child => {
                const post = child.val();
                const div = document.createElement('div');
                div.className = 'item-post';
                div.innerHTML = `<span>• ${post.titolo}</span> 
                                 <button class="btn-elimina" onclick="elimina('${child.key}')">ELIMINA</button>`;
                container.prepend(div);
            });
        });
    }

    function elimina(id) {
        if(confirm("Eliminare?")) db.child(id).remove();
    }
</script>
</body>
</html>
