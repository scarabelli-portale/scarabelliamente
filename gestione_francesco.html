<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestione Archivio Francesco</title>
    <style>
        body { font-family: sans-serif; background-color: #002244; padding: 10px; margin: 0; color: white; text-align: center; }
        #login-box { padding-top: 50px; }
        .login-container { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; display: inline-block; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .login-container input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1.2rem; }
        .btn-login { background: #002244; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .form-container { width: 98%; max-width: 550px; margin: 5px auto; background: white; color: #333; padding: 15px; border-radius: 12px; border-top: 6px solid #FFD700; box-sizing: border-box; min-height: 98vh; display: flex; flex-direction: column; text-align: left; }
        h2 { color: #002244; margin-top: 0; text-align: center; }
        input[type="text"]#titolo { width: 100%; margin-bottom: 6px; padding: 8px; border-radius: 8px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        textarea#testo { width: 100%; margin-bottom: 6px; padding: 8px; border-radius: 8px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1rem; font-family: inherit; resize: none; }
        
        .box-istruzioni { background: #fff9f2; border: 2px dashed #e67e22; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .btn-arancio { background: #e67e22; color: white; padding: 10px; display: block; text-decoration: none; border-radius: 8px; font-size: 0.85rem; line-height: 1.2; font-weight: bold; margin-bottom: 8px; text-align: center; }
        textarea#foto { width: 100%; margin-bottom: 12px; padding: 10px; font-size: 0.95rem; border: 2px solid #002244; border-radius: 8px; box-sizing: border-box; text-align: left; font-family: inherit; resize: none; height: 90px; background: #f0f7ff; }
        
        .btn-pubblica { background: white; color: #28a745; border: 2px solid #28a745; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; }
        
        .lista-titolo { color:#002244; font-size:1.1rem; font-weight:bold; margin: 15px 0 10px 0; border-bottom: 2px solid #002244; }
        #lista-cancella { flex-grow: 1; }
        .riga-post { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 1.1rem; background: #f9f9f9; margin-bottom: 5px; border-radius: 6px; }
        .btn-elimina { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-modifica { background: #f1c40f; color: #333; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-right: 5px; }
        
        .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 9999; }
        .btn-footer { text-decoration: none; color: #002244; font-weight: bold; font-size: 0.9rem; border: 1px solid #002244; padding: 6px 15px; border-radius: 20px; background: #f0f7ff; }
    </style>
</head>
<body>

<div id="login-box" class="login-container">
    <h2>Accesso Riservato</h2>
    <p>Inserisci la password per gestire l'archivio:</p>
    <input type="password" id="pass-input" placeholder="Password">
    <button onclick="checkPass()" class="btn-login">ENTRA</button>
</div>

<div id="main-content" class="form-container" style="display:none;">
    <h2>✍️ Gestione Archivio Francesco</h2>

    <input type="text" id="titolo" placeholder="TITOLO">
    <textarea id="testo" rows="2" placeholder="TESTO"></textarea>

    <div class="box-istruzioni">
        <a href="https://imgbb.com/upload" target="_blank" class="btn-arancio">PULSANTE PER TRASFERIRE FOTO ED IMMAGINI.<br>SEGUIRE LE ISTRUZIONI INTERNO AL SITO IMGBB</a>
        <textarea id="foto" placeholder="Copia il link prodotto da IMGBB ed incollalo in questo spazio. Per i video su YouTube, dopo aver copiato il relativo indirizzo, incollalo in questo spazio."></textarea>
    </div>

    <button id="pubblica" onclick="pubblica()" class="btn-pubblica">CLICCA PER PUBBLICARE</button>

    <div class="lista-titolo">POST ONLINE</div>
    <div id="lista-cancella"></div>
</div>

<div class="footer-nav">
    <a href="index.html" class="btn-footer">🏠 Home</a>
    <a href="francesco.html" class="btn-footer">📚 Archivio</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9EnZdjEVxZLIc",
        databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" 
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    let idInModifica = null;

    function checkPass() {
        const p = document.getElementById('pass-input').value;
        if (p === "123") {
            sessionStorage.setItem("accesso_francesco", "ok");
            mostraGestione();
        } else { alert("Password Errata!"); }
    }

    function mostraGestione() {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
        caricaLista();
    }

    if (sessionStorage.getItem("accesso_francesco") === "ok") { mostraGestione(); }

    function preparaModifica(id) {
        database.ref('archivioFrancesco/' + id).once('value', (snapshot) => {
            const post = snapshot.val();
            document.getElementById('titolo').value = post.titolo;
            document.getElementById('testo').value = post.testo;
            document.getElementById('foto').value = post.immagine || post.urlImmagine || "";
            idInModifica = id;
            
            const btn = document.getElementById('pubblica');
            btn.innerText = "SALVA MODIFICHE ✅";
            btn.style.background = "#002244";
            btn.style.color = "white";
            window.scrollTo(0,0); 
        });
    }

    function pubblica() {
        let tit = document.getElementById('titolo').value;
        let tes = document.getElementById('testo').value;
        let img = document.getElementById('foto').value.trim();
        if (tit === "") { alert("Manca il Titolo!"); return; }

        if (img.includes('<img src="')) {
            img = img.split('<img src="')[1].split('"')[0];
        }

        if (idInModifica) {
            database.ref('archivioFrancesco/' + idInModifica).update({
                titolo: tit, testo: tes, immagine: img, urlImmagine: img
            }).then(() => { 
                alert("Modifica salvata!"); 
                location.reload(); 
            });
        } else {
            database.ref('archivioFrancesco').push({
                titolo: tit, testo: tes, immagine: img, urlImmagine: img,
                autore: "Francesco",
                data: new Date().toLocaleString('it-IT')
            }).then(() => {
                alert("Pubblicato!");
                location.reload();
            });
        }
    }

    function caricaLista() {
        database.ref('archivioFrancesco').on('value', (snap) => {
            const container = document.getElementById('lista-cancella');
            container.innerHTML = "";
            const dati = snap.val();
            if (dati) {
                Object.keys(dati).reverse().forEach((id) => {
                    const post = dati[id];
                    container.insertAdjacentHTML('beforeend', `
                        <div class="riga-post">
                            <span style="cursor:pointer; flex-grow:1; margin-right:10px; font-weight:bold; font-size:0.9rem;" onclick="window.location.href='francesco.html?id=${id}'">• ${post.titolo}</span>
                            <div style="display:flex;">
                                <button class="btn-modifica" onclick="preparaModifica('${id}')">✏️</button>
                                <button class="btn-elimina" onclick="elimina('${id}')">X</button>
                            </div>
                        </div>
                    `);
                });
            }
        });
    }

    function elimina(id) {
        if (confirm("Attenzione! Sei sicuro di voler cancellare definitivamente questo post?")) {
            database.ref('archivioFrancesco').child(id).remove();
        }
    }
</script>
</body>
</html>
