<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pannello Francesco</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-invia { background-color: #28a745; color: white; }
        .btn-home { background-color: #6c757d; color: white; }
        .lista-articoli { margin-top: 30px; border-top: 2px solid #f8f9fa; padding-top: 15px; }
        .item-archivio { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-elimina { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>Gestione Francesco</h2>
    <input type="text" id="titolo" placeholder="Titolo dell'articolo">
    <textarea id="testo" rows="5" placeholder="Scrivi qui il testo..."></textarea>
    <input type="text" id="immagine" placeholder="Link immagine o YouTube">
    <button class="btn-invia" onclick="pubblica()">🚀 PUBBLICA ARTICOLO</button>
    <button class="btn-home" onclick="window.location.href='index.html'">🏠 ESCI E TORNA ALLA HOME</button>
    <div class="lista-articoli" id="lista-articoli"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database().ref('archivioCentrale');

    function pubblica() {
        const titolo = document.getElementById('titolo').value;
        const testo = document.getElementById('testo').value;
        const immagine = document.getElementById('immagine').value;
        if (!titolo) { alert("Inserisci un titolo!"); return; }
        db.push({ titolo, testo, immagine, data: new Date().toISOString() }).then(() => {
            alert("Post caricato con successo!");
            document.getElementById('titolo').value = ""; document.getElementById('testo').value = ""; document.getElementById('immagine').value = "";
        });
    }

    db.limitToLast(5).on('value', snap => {
        const lista = document.getElementById('lista-articoli');
        lista.innerHTML = "<h3>Ultimi post caricati:</h3>";
        snap.forEach(child => {
            const art = child.val();
            const div = document.createElement('div');
            div.className = 'item-archivio';
            div.innerHTML = `<span><b>${art.titolo}</b></span><button class="btn-elimina" onclick="elimina('${child.key}')">🗑️ Elimina</button>`;
            lista.appendChild(div);
        });
    });

    function elimina(id) { if(confirm("Vuoi eliminare definitivamente questo post?")) { db.child(id).remove(); } }
</script>
</body>
</html>
