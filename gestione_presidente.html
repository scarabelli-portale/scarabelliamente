<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SALA COMANDI - PRESIDENTE</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 6px solid #FFD700; margin-bottom: 30px; }
        h2 { color: #001a33; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        .box-foto { background: #fff5eb; border: 2px dashed #e67e22; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; }
        .btn-carica { background: #e67e22; color: white; padding: 10px; display: block; text-decoration: none; font-weight: bold; border-radius: 8px; margin-bottom: 10px; }

        #btn-pubblica { background: #143ca0; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        #btn-pubblica:hover { background: #001a33; transform: scale(1.02); }
        
        .scelta-manifesto { background: #fff3cd; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #ffeeba; display: flex; align-items: center; justify-content: center; }
        
        .radar { background: #e9ecef; padding: 20px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 20px; }
        .post-radar { background: white; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 6px solid #143ca0; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-promuovi { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-elimina { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #area-login { margin-top: 100px; text-align: center; }
        .login-box { background: white; padding: 30px; border-radius: 15px; display: inline-block; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        /* Stile Francobollini */
        .mini-img { width: 50px !important; height: 50px !important; object-fit: cover; border-radius: 5px; margin-right: 15px; border: 1px solid #ddd; flex-shrink: 0; }
        .mini-placeholder { width: 50px; height: 50px; background: #eee; display: flex; align-items: center; justify-content: center; border-radius: 5px; margin-right: 15px; font-size: 1.2rem; flex-shrink: 0; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div id="area-login">
    <div class="login-box">
        <h2 style="color:#143ca0;">Accesso Presidenza 🏛️</h2>
        <input type="password" id="pass" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
        <button onclick="login()" style="background:#143ca0; color:white; border:none; padding:10px; border-radius:5px; width:100%; cursor:pointer; font-weight:bold;">ENTRA</button>
    </div>
</div>

<div id="redazione" style="display:none;">
    <div class="container">
        <div class="box">
            <h2>✍️ Editoriale di Francesco Mariani</h2>
            <div style="margin-bottom: 15px;">
                <a href="index.html">⬅️ TORNA ALLA HOME</a> | 
                <a href="francesco.html">📄 VEDI PAGINA EDITORIALI</a>
            </div>
            
            <input type="text" id="tit" placeholder="TITOLO">
            <textarea id="tes" rows="5" placeholder="TESTO..."></textarea>
            
            <div class="box-foto">
                <a href="https://imgbb.com/upload" target="_blank" class="btn-carica">CARICA FOTO SU IMGBB</a>
                <input type="text" id="img" placeholder="Incolla qui il link della foto">
            </div>

            <div class="scelta-manifesto">
                <input type="checkbox" id="is-manifesto">
                <label for="is-manifesto"><b>ATTIVA COME MANIFESTO</b></label>
            </div>

            <button id="btn-pubblica" onclick="inviaEditoriale()">🚀 PUBBLICA</button>

            <div style="margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px;">
                <h3 style="color:#c0392b;">🗑️ Gestione Post in Home</h3>
                <div id="lista-eliminazione-centrale">Caricamento...</div>
            </div>
        </div>

        <div class="radar">
       <h3 style="margin-top:0; color: #143ca0;">📡 Post dei collaboratori da promuovere in prima</h3>     
            <div id="elenco-radar"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9EnZdjEVxZLIc",
        authDomain: "sito-sergio-b19ce.firebaseapp.com",
        databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "sito-sergio-b19ce"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    function login() {
        if (document.getElementById('pass').value === "ocsecnarf") {
            sessionStorage.setItem("login_presidente", "ok");
            mostraAreaPrivata();
        } else { alert("Password Errata"); }
    }

    if (sessionStorage.getItem("login_presidente") === "ok") { mostraAreaPrivata(); }

    function mostraAreaPrivata() {
        document.getElementById('area-login').style.display = 'none';
        document.getElementById('redazione').style.display = 'block';
        aggiornaRadar();
        caricaEditorialiPerElimina();
    }

    function inviaEditoriale() {
        const t = document.getElementById('tit').value;
        const s = document.getElementById('tes').value;
        const iRaw = document.getElementById('img').value;
        const m = document.getElementById('is-manifesto').checked ? "manifesto" : "normale";
        if(!t) return;
        let img = iRaw.trim();
        if (img.includes('<img src="')) img = img.split('<img src="')[1].split('"')[0];
        database.ref('archivioCentrale').push({
            titolo: t, testo: s, immagine: img, tipo: m, autore: "PRESIDENTE", data: new Date().toLocaleString()
        }).then(() => { location.reload(); });
    }

    function caricaEditorialiPerElimina() {
        const lista = document.getElementById('lista-eliminazione-centrale');
        database.ref('archivioCentrale').on('value', snap => {
            lista.innerHTML = "";
            snap.forEach(child => {
                const art = child.val();
                
                // Gestione francobollino
                let fotoTag = (art.immagine && art.immagine.length > 5) 
                    ? `<img src="${art.immagine}" class="mini-img">` 
                    : `<div class="mini-placeholder">🖼️</div>`;

                const div = document.createElement('div');
                div.className = 'post-radar';
                div.style.borderLeftColor = '#e74c3c';
                // IMPORTANTE: Passiamo child.key alla funzione eliminaPost
                div.innerHTML = `
                    <div style="display:flex; align-items:center; flex:1; overflow:hidden;">
                        ${fotoTag}
                        <div style="overflow:hidden;">
                            <small>${art.data || ''}</small><br>
                            <b style="white-space:nowrap;">${art.titolo}</b>
                        </div>
                    </div>
                    <button class="btn-elimina" onclick="eliminaDefinitivo('${child.key}')">Elimina</button>
                `;
                lista.insertBefore(div, lista.firstChild);
            });
        });
    }

    // Questa è la funzione che "preme il grilletto"
    function eliminaDefinitivo(id) {
        if(confirm("Presidente, sicuro di voler eliminare definitivamente questo post?")) {
            database.ref('archivioCentrale').child(id).remove()
                .then(() => {
                    alert("Cancellato con successo! 🗑️");
                })
                .catch((error) => {
                    alert("Errore nella cancellazione: " + error.message);
                });
        }
    }

    function aggiornaRadar() {
        const redazioni = ['archivioSergio', 'archivioCinzia', 'archivioFausto'];
        const contenitore = document.getElementById('elenco-radar');
        contenitore.innerHTML = "";

        redazioni.forEach(red => {
            database.ref(red).limitToLast(2).once('value', (snap) => {
                snap.forEach(child => {
                    const post = child.val();
                    const nomeAutore = red.replace('archivio', '').toUpperCase();
                    
                    // Gestione fotina anche nel radar
                    let anteprimaRadar = (post.immagine && post.immagine !== "") 
                        ? `<img src="${post.immagine}" class="mini-img">` 
                        : `<div class="mini-placeholder">🖼️</div>`;

                    const html = `
                        <div class="post-radar">
                            <div style="display: flex; align-items: center; flex: 1; overflow: hidden;">
                                ${anteprimaRadar}
                                <div style="overflow: hidden;">
                                    <span style="font-size:0.7rem; color:#143ca0; font-weight:bold;">${nomeAutore}</span><br>
                                    <b style="display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${post.titolo}</b>
                                </div>
                            </div>
                            <button class="btn-promuovi" onclick="promuovi('${child.key}', '${red}')">Promuovi</button>
                        </div>
                    `;
                    contenitore.innerHTML = html + contenitore.innerHTML;
                });
            });
        });
    }

    function promuovi(id, red) {
        database.ref(red + '/' + id).once('value').then(s => {
            database.ref('archivioCentrale').push({
                ...s.val(), autore: red.replace('archivio', '').toUpperCase(), tipo: 'normale', data_promozione: new Date().toLocaleString()
            }).then(() => alert("Promosso!"));
        });
    }
</script>
</body>
</html>
