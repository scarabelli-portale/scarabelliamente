<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTIONE</title>
    <style>
        body { font-family: sans-serif; background: #143ca0; color: white; text-align: center; padding: 0; margin: 0; overflow-x: hidden; }
        
        /* LOGIN - RIDOTTO */
        #area-login { padding-top: 30px; }
        .login-box { width: 90%; max-width: 350px; background: white; padding: 15px; border-radius: 10px; display: inline-block; color: #333; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-entra { background: #143ca0; color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-weight: bold; }

        /* PANNELLO ULTRA COMPATTO */
        .box { width: 96%; max-width: 450px; margin: 5px auto; background: white; color: #333; padding: 8px; border-radius: 10px; border-top: 4px solid #143ca0; box-sizing: border-box; }
        
        /* Input Titolo e Testo */
        input[type="text"], textarea { 
            width: 100%; margin-bottom: 5px; padding: 8px; border-radius: 5px; 
            border: 1px solid #ccc; box-sizing: border-box; font-size: 0.9rem; font-family: inherit;
        }
        
        /* Area Foto/Video */
        .box-foto { background: #fff9f2; border: 1px dashed #e67e22; padding: 5px; border-radius: 8px; margin-bottom: 5px; }
        
        .btn-carica { 
            background: #e67e22; color: white; padding: 6px; display: block; text-decoration: none; 
            border-radius: 5px; font-size: 0.65rem; line-height: 1.1; font-weight: bold; margin-bottom: 5px;
        }

        .label-istruzioni { font-size: 0.65rem; color: #666; display: block; margin-bottom: 3px; line-height: 1; }

        /* Pulsante Pubblica rimpicciolito */
        #pubblica { 
            background: #27ae60; color: white; border: none; padding: 10px; width: 100%; 
            cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 0.9rem;
        }
        
        /* Archivio sotto (si vede solo l'inizio) */
        .lista-titolo { color:#143ca0; font-size:0.75rem; font-weight:bold; margin: 5px 0; }
        .riga-post { display: flex; justify-content: space-between; align-items: center; padding: 5px; border-bottom: 1px solid #eee; font-size: 0.75rem; }
        .btn-elimina { background: #ff4d4d; color: white; border: none; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; }
        .btn-esci { background:#888; color:white; border:none; padding:5px; border-radius:5px; width:100%; margin-top:5px; font-size:0.7rem; }
    </style>
</head>
<body>

<div id="area-login">
    <div class="login-box">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-entra" onclick="login()">ENTRA</button>
    </div>
</div>

<div id="redazione" style="display:none;">
    <div class="box">
        <input type="text" id="tit" placeholder="TITOLO">
        <textarea id="tes" rows="3" placeholder="TESTO"></textarea>
        
        <div class="box-foto">
            <a href="https://imgbb.com/upload" target="_blank" class="btn-carica">
                PULSANTE PER TRASFERIRE FOTO ED IMMAGINI.<br>
                SEGUIRE LE ISTRUZIONI INTERNO AL SITO IMGBB
            </a>
            <span class="label-istruzioni">INCOLLA IL LINK PRODOTTO DA IMGBB O L'INDIRIZZO YOUTUBE SOTTO:</span>
            <input type="text" id="img" placeholder="Incolla link qui..." style="margin-bottom:0; padding:5px; font-size:0.8rem;">
        </div>
        
        <button id="pubblica" onclick="invia()">🚀 PUBBLICA ORA</button>

        <div class="lista-titolo">POST ONLINE</div>
        <div id="lista-post"></div>
        
        <button onclick="location.href='sergio.html'" class="btn-esci">ESCI</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    function login() {
        if (document.getElementById('pass').value === "123") { 
            document.getElementById('area-login').style.display = 'none';
            document.getElementById('redazione').style.display = 'block';
        } else { alert("Errata"); }
    }

    function invia() {
        let t = document.getElementById('tit').value;
        let s = document.getElementById('tes').value;
        let i = document.getElementById('img').value.trim();
        if(!t) return;
        database.ref('archivioSergio').push({
            titolo: t, testo: s, immagine: i, data: new Date().toLocaleString('it-IT')
        }).then(() => { window.location.href = "sergio.html"; });
    }

    database.ref('archivioSergio').on('value', (snapshot) => {
        const c = document.getElementById('lista-post');
        c.innerHTML = "";
        snapshot.forEach((child) => {
            c.insertAdjacentHTML('afterbegin', `
                <div class="riga-post">
                    <span>${child.val().titolo.substring(0,25)}...</span>
                    <button class="btn-elimina" onclick="database.ref('archivioSergio/${child.key}').remove()">X</button>
                </div>
            `);
        });
    });
</script>
</body>
</html>
