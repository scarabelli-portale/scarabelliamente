<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Archivio Sergio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f2; padding: 20px; }
        .form-container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #143ca0; }
        h2 { color: #143ca0; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-logout { background: #666; margin-top: 10px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="form-container">
    <h2>✍️ Aggiungi all'Archivio</h2>
    <input type="text" id="titolo" placeholder="Titolo del video o foto">
    <textarea id="testo" rows="4" placeholder="Racconta la storia..."></textarea>
    <input type="text" id="link" placeholder="Incolla Link YouTube o ImgBB">
    <p style="font-size: 0.75rem; color: #666;">*Se incolli il codice di ImgBB, lo pulirò io automaticamente.</p>
    <button onclick="salva()">PUBBLICA NELL'ARCHIVIO</button>
    <button class="btn-logout" onclick="location.href='sergio.html'">ESCI / TORNA INDIETRO</button>
</div>

<script>
    // Controllo se sei passato dal login
    if(sessionStorage.getItem('auth_sergio') !== 'ok') { location.href = 'login_sergio.html'; }

    const firebaseConfig = {
        apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9EnZdjEVxZLIc",
        authDomain: "sito-sergio-b19ce.firebaseapp.com",
        databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "sito-sergio-b19ce"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    // Funzione scudo per pulire i link
    function pulisciLink(url) {
        if (!url) return "";
        let u = url.trim();
        if (u.includes('<img src=')) {
            let match = u.match(/src=["']([^"']+)["']/);
            return match ? match[1] : u;
        }
        return u;
    }

    function salva() {
        const t = document.getElementById('titolo').value;
        const txt = document.getElementById('testo').value;
        const l = pulisciLink(document.getElementById('link').value);

        if(t && l) {
            database.ref('archivioSergio').push({
                titolo: t,
                testo: txt,
                immagine: l,
                data: new Date().toISOString()
            }, () => {
                alert('Caricato con successo!');
                location.href = 'sergio.html';
            });
        } else {
            alert('Per favore, inserisci almeno il Titolo e il Link!');
        }
    }
</script>
</body>
</html>
