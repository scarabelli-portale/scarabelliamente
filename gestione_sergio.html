<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GESTIONE SERGIO</title>
    <style>
        body { font-family: sans-serif; background: #143ca0; color: white; text-align: center; padding: 0; margin: 0; }
        #area-login { padding-top: 50px; }
        .login-box { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; display: inline-block; color: #333; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1.2rem; }
        .box { width: 98%; max-width: 550px; margin: 5px auto; background: white; color: #333; padding: 15px; border-radius: 12px; border-top: 6px solid #143ca0; box-sizing: border-box; min-height: 98vh; display: flex; flex-direction: column; }
        
        /* Campi Titolo e Testo ridotti per recuperare spazio */
        input[type="text"]#tit { width: 100%; margin-bottom: 6px; padding: 8px; border-radius: 8px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        textarea#tes { width: 100%; margin-bottom: 6px; padding: 8px; border-radius: 8px; border: 2px solid #ccc; box-sizing: border-box; font-size: 1rem; font-family: inherit; resize: none; }
        
        .box-foto { background: #fff9f2; border: 2px dashed #e67e22; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .btn-carica { background: #e67e22; color: white; padding: 10px; display: block; text-decoration: none; border-radius: 8px; font-size: 0.85rem; line-height: 1.2; font-weight: bold; margin-bottom: 8px; }
        
        /* Campo Link su due righe per massima leggibilità */
        textarea#img { 
            width: 100%; 
            margin-bottom: 0; 
            padding: 8px; 
            font-size: 0.8rem; 
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            text-align: center;
            font-family: inherit;
            resize: none;
            height: 50px; 
        }
        
        #pubblica { background: white; color: #27ae60; border: 2px solid #27ae60; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 0.85rem; text-transform: uppercase; }
        
        .lista-titolo { color:#143ca0; font-size:1.1rem; font-weight:bold; margin: 15px 0 10px 0; border-bottom: 2px solid #143ca0; }
        #lista-post { flex-grow: 1; }
        .riga-post { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 1.1rem; background: #f9f9f9; margin-bottom: 5px; border-radius: 6px; }
        .btn-elimina { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-esci { background:#888; color:white; border:none; padding:12px; border-radius:8px; width:100%; margin-top:15px; font-size: 1rem; cursor:pointer; }
    </style>
</head>
<body>
<div id="area-login">
    <div class="login-box">
        <input type="password" id="pass" placeholder="Password">
        <button style="background:#143ca0; color:white; border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold;" onclick="login()">ENTRA</button>
    </div>
</div>
<div id="redazione" style="display:none;">
    <div class="box">
        <input type="text" id="tit" placeholder="TITOLO">
        <textarea id="tes" rows="2" placeholder="TESTO"></textarea>
        <div class="box-foto">
            <a href="https://imgbb.com/upload" target="_blank" class="btn-carica">
                PULSANTE PER TRASFERIRE FOTO ED IMMAGINI.<br>
                SEGUIRE LE ISTRUZIONI INTERNO AL SITO IMGBB<br>
                <small>(Chiudi la scheda per tornare qui)</small>
            </a>
            <textarea id="img" placeholder="INCOLLA IN QUESTO SPAZIO IL LINK COMPLETO PRODOTTO DA IMGBB oppure il link DI YOUTUBE"></textarea>
        </div>
        <button id="pubblica" onclick="invia()">CLICCA SU QUESTO PULSANTE PER PUBBLICARE SULLA TUA PAGINA</button>
        <div class="lista-titolo">POST ONLINE</div>
        <div id="lista-post"></div>
        <button onclick="location.href='sergio.html'" class="btn-esci">ESCI</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    // --- LOGICA DI ACCESSO CON MEMORIA ---
    function login() {
        const p = document.getElementById('pass').value;
        if (p === "123") { 
            sessionStorage.setItem("accesso_sergio", "ok"); // Salva l'autorizzazione nel browser
            mostraRedazione();
        } else { 
            alert("Password Errata"); 
        }
    }

    function mostraRedazione() {
        document.getElementById('area-login').style.display = 'none';
        document.getElementById('redazione').style.display = 'flex';
    }

    // Controllo automatico: se sei già passato di qui, entra subito
    if (sessionStorage.getItem("accesso_sergio") === "ok") {
        mostraRedazione();
    }
    // -------------------------------------

    function invia() {
        let t = document.getElementById('tit').value;
        let s = document.getElementById('tes').value;
        let i = document.getElementById('img').value.trim();
        if(!t) { alert("Inserisci un titolo!"); return; }
        database.ref('archivioSergio').push({ titolo: t, testo: s, immagine: i, data: new Date().toLocaleString('it-IT') }).then(() => { alert("Pubblicato con successo!"); location.reload(); });
    }

    function confermaElimina(id) { 
        if (confirm("Attenzione! Sei sicuro di voler cancellare definitivamente questo post?")) { 
            database.ref('archivioSergio/' + id).remove(); 
        } 
    }

    database.ref('archivioSergio').on('value', (snapshot) => {
        const c = document.getElementById('lista-post');
        c.innerHTML = "";
        snapshot.forEach((child) => {
            const post = child.val();
            c.insertAdjacentHTML('afterbegin', `
                <div class="riga-post">
                    <span style="cursor:pointer; flex-grow:1; margin-right:10px; font-weight:bold;" onclick="window.location.href='sergio.html?id=${child.key}'">${post.titolo}</span>
                    <button class="btn-elimina" onclick="confermaElimina('${child.key}')">X</button>
                </div>
            `);
        });
    });
</script>
</body>
</html>
