<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>AREA REDAZIONE - CINZIA</title>
    <style>
        body { font-family: 'Times New Roman', serif; background: #003366; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; width: 320px; border: 4px solid #e67e22; }
        h2 { color: #003366; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .sottotitolo { color: #e67e22; font-weight: bold; margin-bottom: 25px; font-size: 0.9rem; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; text-align: center; font-size: 1.1rem; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #219150; }
        .torna { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>AREA REDAZIONE</h2>
    <div class="sottotitolo">Accesso Cinzia</div>
    <p style="font-style: italic; color: #555; font-size: 0.9rem;">Inserire la parola d'ordine</p>
    
    <input type="password" id="pass" placeholder="Scrivi qui...">
    <button onclick="entra()">ENTRA NELL'AREA PUBBLICAZIONE</button>
    
    <a href="cinzia.html" class="torna">← Torna al sito di Cinzia</a>
</div>

<script>
    function entra() {
        const passwordInserita = document.getElementById('pass').value.trim().toLowerCase();
        // ECCO LA MODIFICA: password aiznic e manda a gestione_cinzia.html
        if (passwordInserita === "aiznic") {
            sessionStorage.setItem("accesso_redazione_cinzia", "ok");
            window.location.href = "gestione_cinzia.html";
        } else {
            alert("Codice errato! Scrivi 'aiznic' tutto minuscolo.");
            document.getElementById('pass').value = "";
        }
    }
    document.getElementById('pass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { entra(); }
    });
</script>
</body>
</html>
