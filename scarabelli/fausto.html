<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METEO E ARCHIVIO - Ravaldi</title>
    <style>
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; color: #1a1a1a; line-height: 1.4; }
        .copertina-container { position: relative; width: 100%; max-width: 1300px; margin: 0 auto; height: 280px; overflow: hidden; border-bottom: 5px solid #0056b3; }
        .foto-scuola { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }
        #scritta-animata { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 10px rgba(0,0,0,1); text-transform: uppercase; letter-spacing: 4px; white-space: nowrap; z-index: 10; }
        .main-container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        /* Box Profilo Ravaldi OTTIMIZZATO (Piccolo al 50%) */
        .box-profilo { text-align: center; background: white; padding: 15px; border-radius: 12px; border: 3px solid #0056b3; margin: 20px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 300px; }
        .foto-profilo { width: 75px; height: 100px; object-fit: cover; border: 2px solid #0056b3; border-radius: 8px; margin-bottom: 5px; }
        
        .box-articolo { background: white; border: 3px solid #0056b3; padding: 25px; border-radius: 8px; box-shadow: 0 3px 8px rgba(0,0,0,0.1); margin-bottom: 20px; overflow: hidden; }
        h1 { color: #0056b3; font-size: 1.8rem; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        .meteo-grid { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .box-meteo { flex: 1; min-width: 300px; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .titolo-meteo { background: #0056b3; color: white; padding: 8px; text-align: center; font-weight: bold; margin-bottom: 10px; border-radius: 4px; }

        @media (max-width: 850px) { .copertina-container { height: 150px; } #scritta-animata { font-size: 1.2rem; } .box-profilo { max-width: 100%; } }  
    </style>
</head>
<body>
    <div class="copertina-container">
        <img src="immagini/_scuola.jpg" class="foto-scuola">
        <div id="scritta-animata"></div> 
    </div>

    <div style="text-align: center; margin: 20px;">
        <a href="index.html" style="background: #0056b3; color: white; padding: 10px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">
            ← TORNA ALLA HOME
        </a>
    </div>

    <div class="main-container">
        <div class="box-profilo">
            <img src="immagini/fausto.jpg" class="foto-profilo" onerror="this.src='immagini/_scuola.jpg'">
            <h3 style="color: #0056b3; margin: 0; text-transform: uppercase; font-size: 1rem;">Fausto Ravaldi</h3>
            <p style="font-style: italic; color: #666; font-size: 0.8rem; margin: 2px 0;">Esperto Meteo e Curatore Archivio</p>
        </div>

        <div class="meteo-grid">
            <div class="box-meteo">
                <div class="titolo-meteo">Mappa Radar Precipitazioni</div>
                <iframe width="100%" height="410" src="https://embed.windy.com/embed2.html?lat=44.354&lon=11.714&zoom=8&overlay=rain&product=ecmwf&pressure=true&type=map&location=coordinates" frameborder="0"></iframe>
            </div>
            <div class="box-meteo">
                <div class="titolo-meteo">Dati Tecnici Real-Time</div>
                <iframe src="https://www.ilmeteo.it/box/previsioni.php?citta=3425&type=real1&width=300&ico=5&lang=ita&days=3&font=Arial&fontsize=12&bg=FFFFFF&fg=000000&bgtitle=0056b3&fgtitle=FFFFFF&bgbox=F8F9FA&fgbox=333333" width="100%" height="410" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>

        <div id="lista-articoli"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9enZdjEVxZLic",
            authDomain: "sito-sergio-b19ce.firebaseapp.com",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sito-sergio-b19ce",
            storageBucket: "sito-sergio-b19ce.firebasestorage.app",
            messagingSenderId: "194311505630",
            appId: "1:194311505630:web:ceb9aead0f020c3697a44f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const articoliRef = ref(db, 'archivioFausto');

        onValue(articoliRef, (snapshot) => {
            const container = document.getElementById("lista-articoli");
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().forEach(art => {
                    container.innerHTML += `
                        <div class="box-articolo">
                            <span style="font-size:0.75rem; color:#666;">Data: ${art.data || ''}</span>
                            <h1>${art.titolo}</h1>
                            <div style="font-size:1.1rem; text-align:justify; white-space:pre-wrap; border-top: 1px solid #eee; padding-top: 15px;">${art.testo}</div>
                        </div>`;
                });
            }
        });

        const testoScritta = "METEO E ARCHIVIO";
        let j = 0;
        function animaTitolo() {
            if (j < testoScritta.length) {
                document.getElementById("scritta-animata").innerHTML += testoScritta.charAt(j);
                j++;
                setTimeout(animaTitolo, 130);
            }
        }
        window.onload = animaTitolo;
    </script>
</body>
</html>
