<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVIO SERGIO - VERSIONE FINALE</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        body { font-family: Arial, sans-serif; background: #eee; margin: 0; padding: 0; } 

        .header-scuola { position: relative; width: 100%; max-height: 200px; overflow: hidden; background: #fff; border-bottom: 4px solid #143ca0; display: flex; justify-content: center; }
        .header-scuola img { width: 100%; max-width: 900px; height: auto; object-fit: cover; }
        .testo-sopra-foto { position: absolute; bottom: 10px; font-family: 'Dancing Script', cursive; color: white; font-size: 1.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 10; }
        .home-link { left: 20px; text-decoration: none; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 20px; }
        .btn-gestione { right: 20px; background: #FFD700; color: #143ca0; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }

        .griglia-multimedia { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-width: 1000px; margin: auto; }
        .elemento-album { background: white; border-radius: 8px; overflow: hidden; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .media-box { width: 100%; aspect-ratio: 1 / 1; background: #333; display: flex; align-items: center; justify-content: center; }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }
        .titolo-post { font-size: 0.9rem; font-weight: bold; text-align: center; padding: 10px; color: #143ca0; }

        #overlay-blu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20, 60, 160, 0.98); z-index: 9999; color: white; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        #box-contenuto { max-width: 600px; width: 100%; margin: 10px auto; text-align: center; }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin-bottom: 15px; border: 3px solid white; border-radius: 10px; background: black; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .testo-storia { text-align: justify; font-size: 1.1rem; line-height: 1.6; margin: 15px 0; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; white-space: pre-wrap; }
        
        .area-edit { display: none; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-top: 10px; }
        .input-modifica { width: 100%; padding: 10px; border-radius: 5px; border: none; margin: 8px 0; font-size: 1rem; }
        .btn-salva { background: #28a745; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .chiudi-btn { background: white; color: #143ca0; padding: 10px 25px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }

        @media (max-width: 600px) { .griglia-multimedia { grid-template-columns: repeat(2, 1fr); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="header-scuola">
        <img src="immagini/foto_scuola.jpg" alt="Scuola">
        <a href="index.html" class="testo-sopra-foto home-link">⬅ Home</a>
        <div class="testo-sopra-foto btn-gestione" id="btn-gest" onclick="attivaGestione()">⚙ GESTIONE</div>
    </div>

    <div class="griglia-multimedia" id="lista-multimedia"></div>

    <div id="overlay-blu">
        <div id="box-contenuto">
            <div id="media-display"></div> 
            
            <h2 id="titolo-view" style="font-family: 'Dancing Script', cursive; color: #FFD700; font-size: 2rem;"></h2>
            <div id="testo-view" class="testo-storia"></div>

            <div id="zona-modifica" class="area-edit">
                <input type="text" id="titolo-edit" class="input-modifica">
                <textarea id="testo-edit" class="input-modifica" style="height: 150px;"></textarea>
                <button class="btn-salva" onclick="salvaModifiche()">💾 SALVA</button>
            </div>

            <button class="chiudi-btn" onclick="chiudiTutto()">CHIUDI</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9EnZdjEVxZLIc",
            authDomain: "sito-sergio-b19ce.firebaseapp.com",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "sito-sergio-b19ce"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let idCorrente = "";
        let modoGestione = false;

        function attivaGestione() {
            modoGestione = !modoGestione;
            document.getElementById('btn-gest').style.background = modoGestione ? "#28a745" : "#FFD700";
        }

        database.ref('archivioSergio').on('value', (snapshot) => {
            const lista = document.getElementById('lista-multimedia');
            lista.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                const id = child.key;
                const link = data.video || data.immagine;
                let vId = "";
                if (link && link.includes('youtu')) {
                    vId = link.includes('v=') ? link.split('v=')[1].split('&')[0] : link.split('/').pop().split('?')[0];
                }
                let anteprima = vId ? `<img src="https://img.youtube.com/vi/${vId}/hqdefault.jpg">` : `<img src="${data.immagine}">`;
                lista.insertAdjacentHTML('afterbegin', `<div class="elemento-album" onclick='apriContenuto("${id}")'><div class="media-box">${anteprima}</div><div class="titolo-post">${data.titolo || 'Senza titolo'}</div></div>`);
            });
        });

        function apriContenuto(id) {
            idCorrente = id;
            database.ref('archivioSergio/' + id).once('value').then((snapshot) => {
                const data = snapshot.val();
                document.getElementById('titolo-view').innerText = data.titolo || "";
                document.getElementById('testo-view').innerText = data.testo || "";
                
                const display = document.getElementById('media-display');
                const link = data.video || data.immagine;

                if (link && link.includes('youtu')) {
                    let vId = link.includes('v=') ? link.split('v=')[1].split('&')[0] : link.split('/').pop().split('?')[0];
                    // IL TRUCCO DEL "CASUALE" PER BYPASSARE IL 153
                    let randomParam = Math.floor(Math.random() * 9999);
                    display.innerHTML = `<div class="video-container"><iframe src="https://www.youtube.com/embed/${vId}?autoplay=1&mute=0&showinfo=0&rel=0&iv_load_policy=3&nocache=${randomParam}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
                } else {
                    display.innerHTML = `<img src="${data.immagine}" style="width:100%; border-radius:10px;">`;
                }

                document.getElementById('zona-modifica').style.display = modoGestione ? 'block' : 'none';
                if(modoGestione) {
                    document.getElementById('titolo-edit').value = data.titolo || "";
                    document.getElementById('testo-edit').value = data.testo || "";
                }

                document.getElementById('overlay-blu').style.display = 'block';
                document.body.style.overflow = 'hidden';
            });
        }

        function salvaModifiche() {
            database.ref('archivioSergio/' + idCorrente).update({
                titolo: document.getElementById('titolo-edit').value,
                testo: document.getElementById('testo-edit').value
            }).then(() => { alert("Salvato!"); chiudiTutto(); });
        }

        function chiudiTutto() { 
            document.getElementById('overlay-blu').style.display = 'none'; 
            document.getElementById('media-display').innerHTML = ""; 
            document.body.style.overflow = 'auto'; 
        }
    </script>
</body>
</html>
