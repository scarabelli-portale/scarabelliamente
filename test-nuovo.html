<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVIO DI SERGIO SILVESTRINI</title>
    <style>
        body { font-family: 'Times New Roman', serif; margin: 0; background-color: #f4f4f2; color: #1a1a1a; line-height: 1.4; }
        .copertina-container { position: relative; width: 100%; max-width: 1300px; margin: 0 auto; height: 280px; overflow: hidden; border-bottom: 5px solid #0056b3; }
        .foto-scuola { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }
        #scritta-fiori { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 10px rgba(0,0,0,1); text-transform: uppercase; letter-spacing: 4px; white-space: nowrap; z-index: 10; }
        .main-container { max-width: 1300px; margin: 15px auto; padding: 0 10px; }
        .box-articolo { background: white; border: 3px solid #0056b3; padding: 25px; border-radius: 8px; box-shadow: 0 3px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #0056b3; font-size: 1.8rem; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        /* TARGA AZZURRA DEL CONTATORE */
        .counter-box { background: #0056b3; color: white; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; font-family: sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .galleria-foto { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .foto-item { flex: 1 1 200px; max-height: 400px; object-fit: cover; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .foto-item:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* OVERLAY E ZOOM FORZATO (NO TAGLI) */
        #overlay-foto { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100% !important; 
            height: 100% !important; 
            background: rgba(0, 0, 0, 0.9) !important; 
            backdrop-filter: blur(5px); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
        }
        
        #foto-ingrandita { 
            max-width: 90% !important; 
            max-height: 90% !important; 
            width: auto !important;
            height: auto !important;
            object-fit: contain !important; /* Mostra SEMPRE la foto intera, senza tagli */
            border: 5px solid yellow; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8); 
            cursor: zoom-out; 
        }

        .titolo-sezione { border-bottom: 2px solid #0056b3; color: #0056b3; font-size: 1rem; text-transform: uppercase; margin-top: 40px; }
        .griglia-archivio { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .card-archivio { background: white; border: 1px solid #ddd; padding: 10px; cursor: pointer; text-align: center; border-radius: 5px; }
        .img-miniatura { width: 100%; height: 180px; object-fit: contain; background-color: #eee; }
        .btn-ritorno { display: inline-block; background: #2c3e50; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        
        @media (max-width: 850px) { .copertina-container { height: 150px; } #scritta-fiori { font-size: 1.2rem; } }
    </style>
</head>
<body>

    <div id="overlay-foto" onclick="this.style.display='none'">
        <img id="foto-ingrandita" src="">
    </div>

    <div class="copertina-container">
        <img src="_scuola.JPG" class="foto-scuola">
        <div id="scritta-fiori"></div>
    </div>

    <div class="main-container">
        <div id="contatore-box" class="counter-box">
            📄 In questo archivio: <span id="numero-documenti">...</span> documenti
        </div>

        <div id="articolo-protagonista"><p style="text-align:center; padding: 50px;">Caricamento...</p></div>
        <h2 class="titolo-sezione">📜 ARCHIVIO DOCUMENTI</h2>
        <div id="lista-archivio" class="griglia-archivio"></div>
        <a href="index.html" class="btn-ritorno">← TORNA ALLA HOME</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoVrE-Tx0NL2UqDXAK0Z9enZdjEVxZLic",
            authDomain: "sito-sergio-b19ce.firebaseapp.com",
            databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sito-sergio-b19ce",
            storageBucket: "sito-sergio-b19ce.firebasestorage.app",
            messagingSenderId: "194311505630",
            appId: "1:194311505630:web:ceb9aead0f020c3697a44f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const archivioRef = ref(db, 'archivioSergio');

        function aggiustaLink(url) {
            if(!url) return "";
            if(url.startsWith('http')) return url;
            return "https://scarabellianamente.netlify.app/" + url;
        }

        // FUNZIONE ZOOM SEMPLIFICATA
        window.apriZoom = function(src) {
            const overlay = document.getElementById('overlay-foto');
            const imgZoom = document.getElementById('foto-ingrandita');
            imgZoom.src = src;
            overlay.style.display = 'flex';
        };

        let articoliGlobali = [];

        window.leggiArticolo = function(index) {
            const art = articoliGlobali[index];
            const container = document.getElementById("articolo-protagonista");
            let galleriaHtml = "";
            if (art.foto) {
                const elenco = art.foto.split(",");
                galleriaHtml = '<div class="galleria-foto">';
                elenco.forEach(f => {
                    const urlFoto = aggiustaLink(f.trim());
                    if(f.trim() !== "") {
                        galleriaHtml += `<img src="${urlFoto}" class="foto-item" onclick="apriZoom('${urlFoto}')" title="Clicca per ingrandire">`;
                    }
                });
                galleriaHtml += '</div>';
            }
            container.innerHTML = `
                <div class="box-articolo">
                    <span style="font-size:0.75rem; color:#666;">Data: ${art.data || ''}</span>
                    <h1>${art.titolo}</h1>
                    <div style="font-style: italic; margin-bottom: 20px;">Autore: <strong>${art.autore}</strong></div>
                    ${galleriaHtml}
                    <div style="font-size:1.1rem; text-align:justify; white-space:pre-wrap;">${art.testo}</div>
                </div>
            `;
            window.scrollTo({ top: 150, behavior: 'smooth' });
        };

        onValue(archivioRef, (snapshot) => {
            const gridContainer = document.getElementById("lista-archivio");
            const contatoreElemento = document.getElementById("numero-documenti");
            gridContainer.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                articoliGlobali = Object.values(data).reverse();
                contatoreElemento.textContent = articoliGlobali.length;
                leggiArticolo(0);
                articoliGlobali.forEach((art, index) => {
                    const primaFoto = art.foto ? aggiustaLink(art.foto.split(",")[0].trim()) : "";
                    gridContainer.innerHTML += `
                        <div class="card-archivio" onclick="leggiArticolo(${index})">
                            ${primaFoto ? `<img src="${primaFoto}" class="img-miniatura">` : '<div style="height:10px;"></div>'}
                            <h3>${art.titolo}</h3>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
