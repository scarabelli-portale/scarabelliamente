<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizza Post - SCARABELLIAMENTE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .view-container { max-width: 900px; width: 100%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .media-box { width: 100%; border-radius: 10px; overflow: hidden; background: #000; margin-bottom: 20px; text-align: center; }
        .media-box img { max-width: 100%; height: auto; display: block; margin: auto; }
        .media-box iframe { width: 100%; aspect-ratio: 16/9; border: none; }
        h1 { color: #143ca0; font-size: 1.8rem; margin-top: 0; }
        p { line-height: 1.6; color: #333; font-size: 1.1rem; white-space: pre-wrap; }
        .btn-torna { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #143ca0; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="view-container" id="content">
    <div id="media-content" class="media-box">
        </div>
    <h1 id="titolo">Caricamento...</h1>
    <p id="testo"></p>
    <a href="javascript:history.back()" class="btn-torna">← Torna Indietro</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://sito-sergio-b19ce-default-rtdb.europe-west1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // Recupera l'ID del post dall'URL
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const area = params.get('area') || 'archivio_francesco';

    if (id) {
        db.ref(area).child(id).once('value', snap => {
            const post = snap.val();
            if (post) {
                document.getElementById('titolo').innerText = post.titolo;
                document.getElementById('testo').innerText = post.testo || "";

                const mediaBox = document.getElementById('media-content');
                let imgRaw = post.immagine;

                // Gestione ImgBB (estrazione link pulito se è codice HTML)
                if (imgRaw.includes('<img')) {
                    const match = imgRaw.match(/src="([^"]+)"/);
                    if (match) imgRaw = match[1];
                }

                // Se è YouTube, mettiamo il video, altrimenti la foto
                if (imgRaw.includes('youtube.com') || imgRaw.includes('youtu.be')) {
                    let vid = "";
                    if (imgRaw.includes('v=')) { vid = imgRaw.split('v=')[1].split('&')[0]; }
                    else { vid = imgRaw.split('/').pop().split('?')[0]; }
                    mediaBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe>`;
                } else {
                    mediaBox.innerHTML = `<img src="${imgRaw}" onerror="this.src='immagini/francesco.jpg'">`;
                }
            } else {
                document.getElementById('titolo').innerText = "Post non trovato";
            }
        });
    }
</script>

</body>
</html>
